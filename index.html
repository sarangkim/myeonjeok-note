<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>면적노트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #17201b;
      --muted: #65716b;
      --line: #d8ddd8;
      --soft: #eef3ef;
      --brand: #1e6f5c;
      --brand-strong: #124d40;
      --accent: #b45b34;
      --warn: #8a5b13;
      --danger: #a43d35;
      --shadow: 0 16px 38px rgba(30, 43, 35, 0.1);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 850;
    }

    .brand span {
      color: var(--muted);
      font-size: 14px;
    }

    .main-nav {
      position: relative;
      margin-left: auto;
    }

    .menu-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      min-height: 42px;
      border-radius: 8px;
      padding: 0;
      font-size: 23px;
      line-height: 1;
    }

    .main-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 22;
      display: grid;
      gap: 6px;
      width: min(220px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 8px;
    }

    .main-menu[hidden] {
      display: none;
    }

    .main-menu button {
      justify-content: flex-start;
      width: 100%;
      min-height: 38px;
      border-color: transparent;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      text-align: left;
      padding: 8px 10px;
    }

    .main-menu button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .badge {
      border: 1px solid #d8c8b5;
      border-radius: 999px;
      background: #fff8ed;
      color: #7b4a1e;
      font-size: 13px;
      font-weight: 750;
      padding: 7px 11px;
      white-space: nowrap;
    }

    .top-actions {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .account-button {
      position: relative;
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      min-height: 42px;
      border-radius: 50%;
      border-color: var(--line);
      background: #fff;
      color: var(--brand-strong);
      font-size: 14px;
      padding: 0;
      overflow: visible;
    }

    .account-button .account-badge {
      position: absolute;
      top: -7px;
      right: -7px;
      z-index: 2;
      display: grid;
      place-items: center;
      min-width: 20px;
      height: 20px;
      border: 2px solid var(--bg);
      border-radius: 999px;
      background: #e02f2f;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
      padding: 0 5px;
    }

    .account-button img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .account-button:hover,
    .account-button[aria-expanded="true"] {
      border-color: var(--brand);
      background: #e5f2ee;
    }

    .account-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 20;
      display: grid;
      gap: 8px;
      width: min(300px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .account-menu[hidden],
    .account-summary[hidden] {
      display: none;
    }

    .account-email {
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 800;
    }

    .account-summary {
      display: grid;
      gap: 3px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfb;
      padding: 9px;
    }

    .profile-head {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
    }

    .profile-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #e5f2ee;
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 850;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .account-summary strong {
      font-size: 14px;
    }

    .account-summary span,
    .profile-status {
      color: var(--muted);
      font-size: 12px;
    }

    .profile-form {
      display: grid;
      gap: 7px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .profile-form[hidden],
    .side-panel[hidden],
    .field-create[hidden],
    .legacy-field-actions[hidden],
    #notePassword[hidden],
    #shareBox[hidden] {
      display: none;
    }

    .profile-form textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 13px var(--font);
      line-height: 1.5;
      padding: 9px 11px;
      outline: none;
    }

    .search-panel {
      display: grid;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: minmax(280px, 1.5fr) minmax(150px, 0.45fr) minmax(150px, 0.45fr);
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
      padding: 9px 11px;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 111, 92, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 9px 14px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--brand-strong);
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    button.secondary:hover {
      background: var(--soft);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-align: right;
    }

    .status.error {
      color: var(--danger);
    }

    .status.warn {
      color: var(--warn);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      margin-top: 14px;
      align-items: start;
    }

    .workspace.no-results {
      grid-template-columns: 1fr;
    }

    .workspace.no-results .results {
      display: none;
    }

    .workspace.no-results .note-panel {
      position: static;
    }

    .workspace.no-results .side-tabs {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .workspace.no-results .field-create:not([hidden]) {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .workspace.no-results .field-create textarea,
    .workspace.no-results .field-create button {
      grid-column: 1 / -1;
    }

    .results,
    .note-panel {
      display: grid;
      gap: 12px;
    }

    .section,
    .note-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 850;
    }

    .meta-grid,
    .sum-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .sum-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .box {
      min-width: 0;
      border: 1px solid #dfe5df;
      border-radius: 6px;
      background: #f8faf7;
      padding: 10px;
    }

    .box-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .box-value {
      overflow-wrap: anywhere;
      margin-top: 3px;
      font-size: 15px;
      font-weight: 800;
    }

    .sum .box-value {
      font-size: 22px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px;
    }

    .chip:hover,
    .chip.active {
      border-color: var(--brand);
      background: #e5f2ee;
      color: var(--brand-strong);
    }

    .chip.active {
      border-color: #c9352b;
      background: #c9352b;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(201, 53, 43, 0.18);
    }

    .chip.in-range {
      border-color: #d8752f;
      background: #fff1e7;
      color: #9b3c17;
    }

    .ho-picker-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .ho-picker-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: var(--soft);
      color: var(--muted);
      font-weight: 850;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
    }

    .loading {
      display: grid;
      place-items: center;
      gap: 12px;
      min-height: 180px;
      text-align: center;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 4px solid #dce8e3;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .note-panel {
      position: sticky;
      top: 14px;
    }

    .note-panel h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 850;
    }

    .side-panel {
      display: grid;
      gap: 12px;
    }

    .estimate-form {
      display: grid;
      gap: 10px;
    }

    .estimate-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .estimate-result {
      display: grid;
      gap: 8px;
      border: 1px solid #d8c8b5;
      border-radius: 6px;
      background: #fff8ed;
      padding: 12px;
    }

    .estimate-price {
      color: var(--brand-strong);
      font-size: 24px;
      font-weight: 900;
      letter-spacing: 0;
    }

    .estimate-lines {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .note-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfb;
      padding: 10px;
    }

    .note-card strong {
      display: block;
      font-size: 14px;
    }

    .note-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .memo-box {
      display: grid;
      gap: 8px;
    }

    .memo-box textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 14px var(--font);
      line-height: 1.5;
      padding: 10px;
      outline: none;
    }

    .memo-box textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 111, 92, 0.16);
    }

    .share-output {
      display: grid;
      gap: 6px;
      border: 1px solid #d8c8b5;
      border-radius: 6px;
      background: #fff8ed;
      color: #6d431d;
      font-size: 12px;
      padding: 9px;
      overflow-wrap: anywhere;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
    }

    .check-row input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--brand);
    }

    .password-panel {
      display: grid;
      gap: 8px;
      border: 1px solid #d8c8b5;
      border-radius: 6px;
      background: #fff8ed;
      padding: 12px;
    }

    .field-form {
      display: grid;
      gap: 8px;
    }

    .field-form textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 14px var(--font);
      line-height: 1.5;
      padding: 10px;
      outline: none;
    }

    .map-card {
      display: grid;
      gap: 10px;
    }

    .map-canvas {
      width: 100%;
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      overflow: hidden;
    }

    .map-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .map-link {
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      .topbar {
        align-items: flex-start;
      }

      .badge {
        display: none;
      }

      .search-grid,
      .workspace,
      .meta-grid,
      .sum-grid {
        grid-template-columns: 1fr;
      }

      .workspace.no-results .side-tabs,
      .workspace.no-results .field-create:not([hidden]) {
        grid-template-columns: 1fr 1fr;
      }

      .estimate-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .note-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>면적노트</h1>
        <span>주소, 층, 호를 고르면 전유·공용 면적을 바로 정리합니다.</span>
      </div>
      <nav class="main-nav" aria-label="&#51452;&#50836; &#47700;&#45684;">
        <button class="menu-button secondary" id="mainMenuButton" type="button" aria-label="&#47700;&#45684; &#50676;&#44592;" aria-expanded="false">&#9776;</button>
        <div class="main-menu" id="mainMenu" hidden>
          <button class="active" type="button" data-side-view="notes">&#45236; &#47700;&#47784;</button>
          <button type="button" data-side-view="estimate">&#44204;&#51201;</button>
          <button type="button" data-side-view="public">&#44277;&#44060; &#50836;&#52397;</button>
          <button type="button" data-side-view="mine">&#45236; &#50836;&#52397;</button>
          <button type="button" data-side-view="applied">&#45236; &#49888;&#52397;</button>
          <button type="button" data-side-view="board">&#44172;&#49884;&#54032;</button>
        </div>
      </nav>

      <div class="top-actions">
        <button class="account-button" id="accountButton" type="button" aria-label="계정 메뉴" aria-expanded="false">?</button>
        <div class="account-menu" id="accountMenu" hidden>
          <div class="account-email" id="accountEmail">로그인 필요</div>
          <div class="account-summary" id="accountSummary" hidden></div>
          <button id="topGoogleLoginBtn" type="button">구글로 로그인</button>
          <input id="topLoginEmail" type="email" placeholder="이메일 주소">
          <button class="secondary" id="topLoginBtn" type="button">로그인 링크 받기</button>
          <div class="profile-form" id="profileForm" hidden>
            <input id="profileDisplayName" placeholder="이름 또는 담당자명">
            <input id="profileCompanyName" placeholder="업체명">
            <input id="profilePhone" placeholder="연락처">
            <input id="profileServiceArea" placeholder="활동지역 예: 서울 강서구, 마포구">
            <textarea id="profileBio" placeholder="소개 예: 사무실 정기청소와 입주청소를 주로 합니다."></textarea>
            <button id="saveProfileBtn" type="button">프로필 저장</button>
            <div class="profile-status" id="profileStatus"></div>
          </div>
          <button class="secondary" id="topLogoutBtn" type="button" hidden>로그아웃</button>
        </div>
      </div>
    </header>

    <form class="search-panel" id="form">
      <div class="search-grid">
        <label>
          주소
          <input id="address" name="address" autocomplete="street-address" placeholder="예: 서울 중구 세종대로 110">
        </label>
        <label>
          층
          <select id="floor" name="floor">
            <option value="">주소 조회 후 선택</option>
          </select>
        </label>
        <label>
          호
          <input id="ho" name="ho" inputmode="text" placeholder="예: 1306 또는 1216-1218">
        </label>
      </div>
      <div class="actions">
        <div class="button-row">
          <button id="searchBtn" type="submit">조회</button>
          <button class="secondary" id="floorBtn" type="button">층 목록</button>
          <button class="secondary" id="resetBtn" type="button">초기화</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </form>

    <div class="workspace no-results" id="workspace">
      <main class="results" id="results"></main>
      <aside class="note-panel">
        <div class="side-panel" id="notesPanel">
          <h2>내 메모</h2>
          <div class="memo-box">
            <div id="loginForm" hidden>
              <button id="googleLoginBtn" type="button">구글로 로그인</button>
              <div class="note">또는 이메일 링크로 로그인</div>
              <input id="loginEmail" type="email" placeholder="이메일 주소">
              <div class="button-row">
                <button id="loginBtn" type="button">로그인 링크 받기</button>
              </div>
            </div>
            <button class="secondary" id="logoutBtn" type="button" hidden>로그아웃</button>
            <div class="note" id="authStatus">로그인하면 저장한 메모를 계정에서 다시 볼 수 있습니다.</div>
            <ul class="note-list" id="myNoteList"></ul>
          </div>
          <h2>공유 메모</h2>
          <div class="memo-box">
            <textarea id="memo" placeholder="조회한 면적에 대한 메모를 적어두세요."></textarea>
            <label class="check-row">
              <input id="protectNote" type="checkbox">
              비밀번호로 보호
            </label>
            <input id="notePassword" type="password" placeholder="공유 링크 열람 비밀번호" hidden>
            <div class="button-row">
              <button id="saveNoteBtn" type="button">메모 저장</button>

      var estimateFloorCareInput = document.getElementById("estimateFloorCare");
      var estimateWasteInput = document.getElementById("estimateWaste");
      var estimateOffhourInput = document.getElementById("estimateOffhour");
      var calculateEstimateBtn = document.getElementById("calculateEstimateBtn");
      var estimateResult = document.getElementById("estimateResult");
      var accountButton = document.getElementById("accountButton");
      var accountMenu = document.getElementById("accountMenu");
      var accountEmail = document.getElementById("accountEmail");

      var profileServiceAreaInput = document.getElementById("profileServiceArea");
      var profileBioInput = document.getElementById("profileBio");

      var fieldPublicAreaInput = document.getElementById("fieldPublicArea");
      var fieldCleaningTypeInput = document.getElementById("fieldCleaningType");
      var fieldSpaceTypeInput = document.getElementById("fieldSpaceType");
      var fieldRewardInput = document.getElementById("fieldReward");
      var fieldDateInput = document.getElementById("fieldDate");
      var fieldDescriptionInput = document.getElementById("fieldDescription");
      var createFieldRequestBtn = document.getElementById("createFieldRequestBtn");
      var loadFieldRequestsBtn = document.getElementById("loadFieldRequestsBtn");
      var loadMyFieldRequestsBtn = document.getElementById("loadMyFieldRequestsBtn");
      var loadAppliedFieldRequestsBtn = document.getElementById("loadAppliedFieldRequestsBtn");
      var fieldStatus = document.getElementById("fieldStatus");
      var fieldRequestList = document.getElementById("fieldRequestList");
      var mainMenuButton = document.getElementById("mainMenuButton");
      var mainMenu = document.getElementById("mainMenu");
      var sideTabButtons = document.querySelectorAll("[data-side-view]");
      var notesPanel = document.getElementById("notesPanel");
      var requestsPanel = document.getElementById("requestsPanel");
      var requestsPanelTitle = document.getElementById("requestsPanelTitle");
      var fieldCreateBlock = document.getElementById("fieldCreateBlock");
      var boardPanel = document.getElementById("boardPanel");
      var boardTitleInput = document.getElementById("boardTitle");
      var boardBodyInput = document.getElementById("boardBody");
      var createBoardPostBtn = document.getElementById("createBoardPostBtn");
      var boardStatus = document.getElementById("boardStatus");
      var boardList = document.getElementById("boardList");

      var state = {
        floors: [],
        lastAddress: "",
        prefetch: null,
        recent: [],
        currentResult: null,
        currentNote: null,
        config: null,
        kakaoLoading: null,
        map: null,
        marker: null,
        supabaseClient: null,
        authSession: null,
        profile: null,
        profileStats: null,
        selectedHoNorms: [],
        boardCurrentPost: null,
        boardPosts: [],
        boardPage: 1,
        boardPageSize: 10
      };

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        search();
      });

      floorBtn.addEventListener("click", loadSummary);

      resetBtn.addEventListener("click", function () {
        addressInput.value = "";
        hoInput.value = "";
        state.prefetch = null;
        state.lastAddress = "";
        state.selectedHoNorms = [];
        setFloors([]);
        setStatus("");
        resultsEl.innerHTML = "";
        updateWorkspaceLayout();
        fieldCreateBlock.hidden = true;
        addressInput.focus();
      });

      floorSelect.addEventListener("change", function () {
        if (addressInput.value.trim() && floorSelect.value && !hoInput.value.trim()) {
          state.selectedHoNorms = [];
          loadFloor(floorSelect.value);
        }
      });

      saveNoteBtn.addEventListener("click", saveSharedNote);
      copyLinkBtn.addEventListener("click", copyShareLink);
      protectNoteInput.addEventListener("change", function () {
        notePasswordInput.hidden = !protectNoteInput.checked;
        if (!protectNoteInput.checked) notePasswordInput.value = "";
      });
      calculateEstimateBtn.addEventListener("click", renderEstimate);
      estimateTypeInput.addEventListener("change", renderEstimate);
      loginBtn.addEventListener("click", requestLoginLink);
      googleLoginBtn.addEventListener("click", loginWithGoogle);
      logoutBtn.addEventListener("click", logout);
      mainMenuButton.addEventListener("click", toggleMainMenu);

      accountButton.addEventListener("click", toggleAccountMenu);
      topLoginBtn.addEventListener("click", requestLoginLink);
      topGoogleLoginBtn.addEventListener("click", loginWithGoogle);
      topLogoutBtn.addEventListener("click", logout);
      saveProfileBtn.addEventListener("click", saveProfile);
      document.addEventListener("click", function (event) {
        closeAccountMenuOnOutsideClick(event);
        closeMainMenuOnOutsideClick(event);
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape") {
          closeAccountMenu();
          closeMainMenu();
        }
      });
      createFieldRequestBtn.addEventListener("click", createFieldRequest);
      loadFieldRequestsBtn.addEventListener("click", loadFieldRequests);
      loadMyFieldRequestsBtn.addEventListener("click", loadMyFieldRequests);
      loadAppliedFieldRequestsBtn.addEventListener("click", loadAppliedFieldRequests);
      createBoardPostBtn.addEventListener("click", createBoardPost);
      sideTabButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          selectSideView(button.getAttribute("data-side-view"));
        });
      });
      new MutationObserver(updateWorkspaceLayout).observe(resultsEl, { childList: true });

      initAuth();
      loadSharedNoteFromUrl();
      updateWorkspaceLayout();

      async function requestArea(params) {
        setBusy(true);
        showLoading();
        try {
          var url = new URL(API_PATH, window.location.origin);
          Object.keys(params).forEach(function (key) {
            if (params[key] !== undefined && params[key] !== null && String(params[key]).trim() !== "") {
              url.searchParams.set(key, String(params[key]).trim());
            }
          });

          var response = await fetch(url.toString(), { method: "GET" });
          var data = await response.json().catch(function () {
            return null;
          });
          if (!response.ok || !data || data.ok === false) {
            throw new Error((data && data.message) || "조회에 실패했습니다.");
          }
          return data;
        } finally {
          setBusy(false);
        }
      }

      async function loadSummary() {
        var address = addressInput.value.trim();
        if (!address) {
          setStatus("주소를 먼저 입력해주세요.", "error");
          addressInput.focus();
          return;
        }

        setStatus("주소와 층 목록을 조회하는 중입니다.");
        try {
          var data = await requestArea({ address: address });
          state.lastAddress = address;
          state.prefetch = data;
          setFloors(data.floors || []);
          renderSummary(data);
          remember(data, "층 목록");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("층 목록을 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function loadFloor(floor) {
        var address = addressInput.value.trim();
        if (!address || !floor) return;
        setStatus("층 정보를 조회하는 중입니다.");
        hoInput.value = "";
        try {
          var data = hasPrefetch(address) ? buildFloorFromPrefetch(floor) : await requestArea({ address: address, floor: floor });
          renderFloor(data);
          remember(data, "층");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("층 정보를 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function search() {
        var address = addressInput.value.trim();
        var floor = floorSelect.value;
        var ho = hoInput.value.trim();
        if (!address) {
          setStatus("주소를 입력해주세요.", "error");
          addressInput.focus();
          return;
        }
        if (!floor && !ho) {
          await loadSummary();
          return;
        }
        if (!floor && state.lastAddress !== address) {
          await loadSummary();
          floor = floorSelect.value;
        }
        if (isMultiHoInput(ho) && !hasPrefetch(address)) {
          await loadSummary();
          floor = floorSelect.value;
        }

        setStatus("면적 데이터를 조회하는 중입니다.");
        try {
          var data = hasPrefetch(address)
            ? (ho ? buildHoFromPrefetch(floor, ho) : buildFloorFromPrefetch(floor))
            : await requestArea({ address: address, floor: floor, ho: ho });
          state.selectedHoNorms = parseHoSelection(ho);
          if (data.mode === "floor") renderFloor(data);
          else if (data.mode === "ho_breakdown" || data.mode === "multi_exposInfo_fallback") renderHoBreakdown(data);
          else renderFallback(data);
          remember(data, ho ? "호" : "층");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("조회가 완료되었습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      function setFloors(floors) {
        state.floors = floors || [];
        floorSelect.innerHTML = "";
        var first = document.createElement("option");
        first.value = "";
        first.textContent = state.floors.length ? "층 선택" : "주소 조회 후 선택";
        floorSelect.appendChild(first);
        state.floors.forEach(function (floor) {
          var option = document.createElement("option");
          option.value = floor.key || floor.no;
          option.textContent = floor.label || floor.no + "층";
          floorSelect.appendChild(option);
        });
      }

      function setBusy(isBusy) {
        searchBtn.disabled = isBusy;
        floorBtn.disabled = isBusy;
      }

      function setStatus(message, type) {
        statusEl.className = "status" + (type ? " " + type : "");
        statusEl.textContent = message || "";
      }

      function showLoading() {
        resultsEl.innerHTML = '<section class="section loading" aria-live="polite"><div class="spinner"></div><div><strong>공공데이터를 불러오는 중입니다</strong><div class="note">건축물대장 데이터 양에 따라 잠시 걸릴 수 있습니다.</div></div></section>';
        updateWorkspaceLayout();
      }

      function updateWorkspaceLayout() {
        var hasResults = !!(resultsEl && resultsEl.children.length);
        workspaceEl.classList.toggle("no-results", !hasResults);
      }

      function hasPrefetch(address) {
        return !!(
          state.prefetch &&
          state.lastAddress === address &&
          state.prefetch.all_data &&
          Array.isArray(state.prefetch.all_data.floor_items)
        );
      }

      function buildFloorFromPrefetch(floor) {
        var base = state.prefetch || {};
        var all = base.all_data || {};
        var floorItems = (all.floor_items || []).filter(function (item) {
          return sameFloorItem(item, floor);
        });
        var hoIndex = buildHoIndex(all.expos_items || [], all.pub_items || [], floor);
        var hoList = Object.keys(hoIndex).sort(function (a, b) {
          return Number(a) - Number(b);
        });
        var floorExclusive = findFloorExclusiveFromItems(all.pub_items || [], floor);
        return {
          ok: true,
          build: base.build,
          mode: "floor",
          input: { address: addressInput.value.trim(), floor: floor, ho: null },
          road: base.road || "",
          jibun: base.jibun || "",
          keys: base.keys || {},
          floor_items: floorItems.map(toClientFloorItem),
          ho_list: hoList,
          ho_list_note: hoList.length ? "" : "해당 층에서 호 목록을 찾지 못했습니다.",
          ho_index: hoIndex,
          floor_exclusive_m2: floorExclusive ? floorExclusive.m2 : null,
          floor_exclusive_pyeong: floorExclusive ? round2(floorExclusive.m2 / PYEONG_M2) : null,
          floor_exclusive_note: floorExclusive ? floorExclusive.note : null
        };
      }

      function buildHoFromPrefetch(floor, ho) {
        var base = state.prefetch || {};
        var all = base.all_data || {};
        var hoNorms = parseHoSelection(ho);
        if (hoNorms.length > 1) {
          var multiRows = [];
          var seenRows = {};
          hoNorms.forEach(function (hoNorm) {
            findRowsByFloorAndHo(all.pub_items || [], floor, hoNorm).forEach(function (row) {
              var key = [
                row.flrNo || "",
                row.hoNm || "",
                row.exposPubuseGbCd || "",
                row.mainPurpsCdNm || "",
                row.etcPurps || "",
                row.area || ""
              ].join("|");
              if (seenRows[key]) return;
              seenRows[key] = true;
              var copy = Object.assign({}, row);
              copy._selectedHo = hoNorm;
              multiRows.push(copy);
            });
          });
          if (multiRows.length) return buildHoBreakdownLocal(base, floor, ho, hoNorms.join(","), multiRows);
          var exposRows = [];
          var seenExpos = {};
          hoNorms.forEach(function (hoNorm) {
            findRowsByFloorAndHo(all.expos_items || [], floor, hoNorm).forEach(function (row) {
              var key = [row.flrNo || "", row.hoNm || "", row.mainPurpsCdNm || "", row.etcPurps || "", row.area || ""].join("|");
              if (seenExpos[key]) return;
              seenExpos[key] = true;
              exposRows.push(row);
            });
          });
          if (exposRows.length) {
            var exposM2 = round2(exposRows.reduce(function (sum, row) { return sum + toNumber(row.area); }, 0));
            return {
              ok: true,
              build: base.build,
              mode: "multi_exposInfo_fallback",
              input: { address: addressInput.value.trim(), floor: floor, ho: ho },
              road: base.road || "",
              jibun: base.jibun || "",
              keys: base.keys || {},
              sum: areaSummary(exposM2, null),
              breakdown: exposRows.map(function (row) {
                var areaM2 = toNumber(row.area);
                return {
                  gb: "전유",
                  flrNm: row.flrNoNm || "",
                  ho: row.hoNm || "-",
                  use: row.mainPurpsCdNm || row.etcPurps || "",
                  area_m2: areaM2,
                  area_pyeong: round2(areaM2 / PYEONG_M2)
                };
              }),
              note: "전유/공용 breakdown 데이터가 없어 여러 호의 전유부 면적을 합산했습니다."
            };
          }
        }
        var wantHoNorm = normalizeHo(ho);
        var hoRows = findRowsByFloorAndHo(all.pub_items || [], floor, wantHoNorm);
        if (hoRows.length) return buildHoBreakdownLocal(base, floor, ho, wantHoNorm, hoRows);

        var target = findRowsByFloorAndHo(all.expos_items || [], floor, wantHoNorm)[0] || null;
        var areaM2 = target ? toNumber(target.area) : 0;
        if (areaM2 > 0) {
          return {
            ok: true,
            build: base.build,
            mode: "exposInfo_fallback",
            input: { address: addressInput.value.trim(), floor: floor, ho: ho },
            road: base.road || "",
            jibun: base.jibun || "",
            keys: base.keys || {},
            sum: areaSummary(areaM2, null),
            note: "전유/공용 breakdown 데이터가 없어서 전유부 면적으로 안내합니다."
          };
        }

        var floorExclusive = findFloorExclusiveFromItems(all.pub_items || [], floor);
        if (floorExclusive) {
          return {
            ok: true,
            build: base.build,
            mode: "floorExclusive_fallback",
            input: { address: addressInput.value.trim(), floor: floor, ho: ho },
            road: base.road || "",
            jibun: base.jibun || "",
            keys: base.keys || {},
            sum: areaSummary(floorExclusive.m2, null),
            note: "해당 호 데이터가 없어 같은 층의 전유 면적으로 안내합니다.",
            floor_exclusive_note: floorExclusive.note
          };
        }
        throw new Error("해당 층/호 면적 데이터를 찾지 못했습니다.");
      }

      function renderSummary(data) {
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">층 목록</h2>',
          renderFloorChips(data.floors || []),
          '</section>'
        ].join("");
        bindFloorChips();
      }

      function renderFloor(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">층 정보</h2>',
          renderFloorItems(data.floor_items || []),
          renderFloorExclusive(data),
          '</section>',
          '<section class="section" data-ho-picker-section><h2 class="section-title">호 목록</h2>',
          renderHoPickerTools(),
          renderHoChips(data.ho_list || []),
          data.ho_list_note ? '<div class="note">' + esc(data.ho_list_note) + '</div>' : '',
          '</section>',
          renderFieldRequestMount()
        ].join("");
        bindHoChips();
        mountFieldCreateBlock(data);
      }

      function renderHoBreakdown(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        var floorData = hasPrefetch(addressInput.value.trim()) ? buildFloorFromPrefetch(data.input.floor) : null;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">면적 합계 <span>' + esc((data.input && data.input.ho ? data.input.ho : hoInput.value) + "호") + '</span></h2>',
          renderSum(data.sum || {}),
          data.ho_matched && data.ho_matched.note ? '<div class="note">' + esc(data.ho_matched.note) + '</div>' : '',
          '</section>',
          '<section class="section"><h2 class="section-title">전유·공용 breakdown</h2>',
          renderBreakdown(data.breakdown || []),
          data.note ? '<div class="note">' + esc(data.note) + '</div>' : '',
          '</section>',
          renderStickyHoList(floorData, data.input && data.input.ho),
          renderFieldRequestMount()
        ].join("");
        bindHoChips();
        mountFieldCreateBlock(data);
      }

      function renderFallback(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        var floorData = hasPrefetch(addressInput.value.trim()) ? buildFloorFromPrefetch(data.input.floor) : null;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">면적 결과 <span>' + esc((data.input && data.input.ho ? data.input.ho : hoInput.value) + "호") + '</span></h2>',
          renderSum(data.sum || {}),
          data.note ? '<div class="note">' + esc(data.note) + '</div>' : '',
          data.floor_exclusive_note ? '<div class="note">' + esc(data.floor_exclusive_note) + '</div>' : '',
          '</section>',
          renderStickyHoList(floorData, data.input && data.input.ho),
          renderFieldRequestMount()
        ].join("");
        bindHoChips();
        mountFieldCreateBlock(data);
      }

      function renderAddress(data) {
        return [
          '<section class="section"><h2 class="section-title">주소</h2><div class="meta-grid">',
          box("도로명", data.road || "-"),
          box("지번", data.jibun || "-"),
          '</div></section>',
          renderMapShell(data)
        ].join("");
      }

      function renderMapShell(data) {
        var address = data.road || data.jibun || data.address || "";
        if (!address || address === "-") return "";
        return [
          '<section class="section map-card">',
          '<h2 class="section-title">지도</h2>',
          '<div class="map-canvas" id="kakaoMap"></div>',
          '<div class="map-actions">',
          '<div class="note" id="mapStatus">지도를 준비하는 중입니다.</div>',
          '<a class="map-link" target="_blank" rel="noopener" href="' + escAttr(kakaoSearchUrl(address)) + '">카카오맵에서 보기</a>',
          '</div>',
          '</section>'
        ].join("");
      }

      function renderFloorChips(floors) {
        if (!floors.length) return '<div class="note">조회된 층이 없습니다.</div>';
        return '<div class="chips">' + floors.map(function (floor) {
          return '<button class="chip" type="button" data-floor="' + escAttr(floor.key || floor.no) + '">' + esc(floor.label || floor.no + "층") + '</button>';
        }).join("") + '</div>';
      }

      function renderHoChips(hoList, activeHo) {
        if (!hoList.length) return '<div class="note">조회된 호 목록이 없습니다. 호를 직접 입력해 조회할 수 있습니다.</div>';
        var activeNorms = parseHoSelection(activeHo || hoInput.value);
        return '<div class="chips">' + hoList.map(function (ho) {
          var norm = normalizeHo(ho);
          var isSelected = state.selectedHoNorms.indexOf(norm) !== -1;
          var isActive = !isSelected && activeNorms.length === 1 && norm === activeNorms[0];
          var inRange = isSelected || (activeNorms.length > 1 && activeNorms.indexOf(norm) !== -1);
          var className = isActive ? " active" : (inRange ? " in-range" : "");
          return '<button class="chip' + className + '" type="button" data-ho="' + escAttr(ho) + '">' + esc(ho + "호") + '</button>';
        }).join("") + '</div>';
      }

      function renderStickyHoList(floorData, activeHo) {
        if (!floorData) return "";
        return [
          '<section class="section" data-ho-picker-section><h2 class="section-title">같은 층 호 목록</h2>',
          renderHoPickerTools(),
          renderHoChips(floorData.ho_list || [], activeHo),
          floorData.ho_list_note ? '<div class="note">' + esc(floorData.ho_list_note) + '</div>' : '',
          '</section>'
        ].join("");
      }

      function renderHoPickerTools() {
        var count = state.selectedHoNorms.length;
        return [
          '<div class="ho-picker-tools">',
          '<div class="note">' + esc(count ? count + "개 호 선택됨" : "여러 호를 터치해서 합산할 수 있습니다.") + '</div>',
          '<div class="ho-picker-actions">',
          '<button class="chip" type="button" data-merge-selected-ho' + (count ? '' : ' disabled') + '>선택한 호 합산</button>',
          '<button class="chip" type="button" data-clear-selected-ho' + (count ? '' : ' hidden') + '>선택 해제</button>',
          '</div>',
          '</div>'
        ].join("");
      }

      function renderFloorItems(items) {
        if (!items.length) return '<div class="note">층 면적 항목이 없습니다.</div>';
        return [
          '<div class="table-wrap"><table><thead><tr><th>구분</th><th>용도</th><th>상세</th><th class="num">m²</th><th class="num">평</th></tr></thead><tbody>',
          items.map(function (item) {
            return '<tr><td>' + esc(item.gb) + '</td><td>' + esc(item.use) + '</td><td>' + esc(item.detail) + '</td><td class="num">' + fmt(item.area_m2) + '</td><td class="num">' + fmt(item.area_pyeong) + '</td></tr>';
          }).join(""),
          '</tbody></table></div>'
        ].join("");
      }

      function renderFloorExclusive(data) {
        if (!data.floor_exclusive_m2) return "";
        return '<div class="sum-grid sum">' + box("층 전유 m²", data.floor_exclusive_m2) + box("층 전유 평", data.floor_exclusive_pyeong) + box("기준", data.floor_exclusive_note || "-") + '</div>';
      }

      function renderSum(sum) {
        return [
          '<div class="sum-grid sum">',
          box("전유 m²", sum.exclusive_m2),
          box("공용 m²", sum.shared_m2),
          box("합계 m²", sum.total_m2),
          box("전유 평", sum.exclusive_pyeong),
          box("공용 평", sum.shared_pyeong),
          box("합계 평", sum.total_pyeong),
          '</div>'
        ].join("");
      }

      function renderBreakdown(rows) {
        if (!rows.length) return '<div class="note">breakdown 항목이 없습니다.</div>';
        return [
          '<div class="table-wrap"><table><thead><tr><th>구분</th><th>층</th><th>호</th><th>용도</th><th class="num">m²</th><th class="num">평</th></tr></thead><tbody>',
          rows.map(function (row) {
            return '<tr><td>' + esc(row.gb || "-") + '</td><td>' + esc(row.flrNm || "-") + '</td><td>' + esc(row.ho || "-") + '</td><td>' + esc(row.use || "-") + '</td><td class="num">' + fmt(row.area_m2) + '</td><td class="num">' + fmt(row.area_pyeong) + '</td></tr>';
          }).join(""),
          '</tbody></table></div>'
        ].join("");
      }

      function bindFloorChips() {
        resultsEl.querySelectorAll("[data-floor]").forEach(function (button) {
          button.addEventListener("click", function () {
            floorSelect.value = button.getAttribute("data-floor");
            loadFloor(floorSelect.value);
          });
        });
      }

      function bindHoChips() {
        resultsEl.querySelectorAll("[data-ho]").forEach(function (button) {
          button.addEventListener("click", function () {
            toggleSelectedHo(button.getAttribute("data-ho"));
          });
        });
        resultsEl.querySelectorAll("[data-merge-selected-ho]").forEach(function (button) {
          button.addEventListener("click", searchSelectedHo);
        });
        resultsEl.querySelectorAll("[data-clear-selected-ho]").forEach(function (button) {
          button.addEventListener("click", clearSelectedHo);
        });
      }

      function toggleSelectedHo(ho) {
        var norm = normalizeHo(ho);
        if (!norm) return;
        var next = state.selectedHoNorms.slice();
        var index = next.indexOf(norm);
        if (index === -1) next.push(norm);
        else next.splice(index, 1);
        state.selectedHoNorms = uniqueSortedHoNorms(next);
        hoInput.value = formatHoSelection(state.selectedHoNorms);
        rerenderStickyHoList();
      }

      function clearSelectedHo() {
        state.selectedHoNorms = [];
        hoInput.value = "";
        rerenderStickyHoList();
      }

      function searchSelectedHo() {
        if (!state.selectedHoNorms.length) return;
        hoInput.value = formatHoSelection(state.selectedHoNorms);
        search();
      }

      function rerenderStickyHoList() {
        var section = resultsEl.querySelector("[data-ho-picker-section]");
        if (!section) return;
        var floorData = hasPrefetch(addressInput.value.trim()) ? buildFloorFromPrefetch(floorSelect.value) : null;
        if (!floorData) return;
        section.outerHTML = renderStickyHoList(floorData, hoInput.value);
        bindHoChips();
      }

      function remember(data, type) {
        var input = data.input || {};
        var title = [input.floor, input.ho ? input.ho + "호" : ""].filter(Boolean).join(" ");
        var item = {
          address: input.address || addressInput.value.trim(),
          title: title || type,
          road: data.road || "",
          total: data.sum && data.sum.total_pyeong ? data.sum.total_pyeong + "평" : ""
        };
        state.recent = [item].concat(state.recent).slice(0, 5);
        renderRecent();
      }

      async function loadSharedNoteFromUrl() {
        var id = new URLSearchParams(window.location.search).get("note");
        if (!id) return;

        setStatus("공유 메모를 불러오는 중입니다.");
        try {
          var response = await fetch("/api/notes?id=" + encodeURIComponent(id), { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "공유 메모를 불러오지 못했습니다.");

          if (data.password_required) {
            state.currentNote = data.note;
            renderLockedNote(data.note);
            showShareLink(id);
            setStatus("비밀번호가 필요한 메모입니다.");
            return;
          }

          var note = data.note;
          state.currentNote = note;
          state.currentResult = note.result || null;
          addressInput.value = note.address || note.road || "";
          hoInput.value = note.ho || "";
          memoInput.value = note.memo || "";
          protectNoteInput.checked = !!note.has_password;
          notePasswordInput.hidden = !protectNoteInput.checked;
          renderSharedNote(note);
          showShareLink(id);
          renderMap(note);
          setStatus("공유 메모를 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function saveSharedNote() {
        if (!state.currentResult) {
          setStatus("먼저 주소나 호를 조회해주세요.", "error");
          return;
        }

        var result = state.currentResult || {};
        var input = result.input || {};
        var id = state.currentNote && state.currentNote.id;
        var editToken = id ? localStorage.getItem("myeonjeok_note_edit_" + id) : "";
        var payload = {
          id: id,
          edit_token: editToken,
          address: input.address || addressInput.value.trim(),
          road: result.road || "",
          jibun: result.jibun || "",
          floor: input.floor || floorSelect.value || "",
          ho: input.ho || hoInput.value.trim() || "",
          memo: memoInput.value,
          result: result,
          password: protectNoteInput.checked ? notePasswordInput.value : ""
        };

        setStatus("메모를 저장하는 중입니다.");
        try {
          var response = await fetch("/api/notes", {
            method: id && editToken ? "PATCH" : "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify(payload)
          });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "메모 저장에 실패했습니다.");

          state.currentNote = data.note;
          if (data.edit_token) localStorage.setItem("myeonjeok_note_edit_" + data.note.id, data.edit_token);
          showShareLink(data.note.id);
          rememberSavedNote(data.note);
          if (state.authSession) loadMyNotes();
          setStatus("메모를 저장했습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function copyShareLink() {
        if (!state.currentNote || !state.currentNote.id) {
          setStatus("복사할 공유 링크가 없습니다.", "error");
          return;
        }

        var link = shareLink(state.currentNote.id);
        try {
          await navigator.clipboard.writeText(link);
          setStatus("공유 링크를 복사했습니다.");
        } catch {
          showShareLink(state.currentNote.id);
          setStatus("아래 공유 링크를 직접 복사해주세요.", "warn");
        }
      }

      function setCurrentResult(data) {
        state.currentResult = data;
        state.currentNote = null;
        shareBox.hidden = true;
        shareBox.textContent = "";
        syncEstimateArea(data);
      }

      function showShareLink(id) {
        shareBox.hidden = false;
        shareBox.textContent = shareLink(id);
      }

      function shareLink(id) {
        return window.location.origin + window.location.pathname + "?note=" + encodeURIComponent(id);
      }

      function renderSharedNote(note) {
        var result = note.result || {};
        var parts = [renderAddress(note)];
        if (result.sum) {
          parts.push('<section class="section"><h2 class="section-title">저장된 면적</h2>' + renderSum(result.sum) + '</section>');
        }
        if (Array.isArray(result.breakdown)) {
          parts.push('<section class="section"><h2 class="section-title">저장된 breakdown</h2>' + renderBreakdown(result.breakdown) + '</section>');
        }
        parts.push('<section class="section"><h2 class="section-title">메모</h2><div class="note">' + esc(note.memo || "저장된 메모가 없습니다.") + '</div></section>');
        resultsEl.innerHTML = parts.join("");
      }

      function renderLockedNote(note) {
        resultsEl.innerHTML = [
          '<section class="section password-panel">',
          '<h2 class="section-title">비밀번호가 필요한 메모</h2>',
          '<div class="note">공유받은 비밀번호를 입력하면 저장된 면적과 메모를 볼 수 있습니다.</div>',
          '<input id="unlockPassword" type="password" placeholder="비밀번호">',
          '<button id="unlockBtn" type="button">열람하기</button>',
          '</section>'
        ].join("");

        document.getElementById("unlockBtn").addEventListener("click", function () {
          unlockSharedNote(note.id, document.getElementById("unlockPassword").value);
        });
      }

      async function unlockSharedNote(id, password) {
        if (!password) {
          setStatus("비밀번호를 입력해주세요.", "error");
          return;
        }

        setStatus("비밀번호를 확인하는 중입니다.");
        try {
          var response = await fetch("/api/notes?id=" + encodeURIComponent(id) + "&password=" + encodeURIComponent(password), { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "메모를 열지 못했습니다.");
          if (data.password_required) {
            setStatus("비밀번호가 맞지 않습니다.", "error");
            return;
          }

          var note = data.note;
          state.currentNote = note;
          state.currentResult = note.result || null;
          memoInput.value = note.memo || "";
          protectNoteInput.checked = !!note.has_password;
          notePasswordInput.hidden = !protectNoteInput.checked;
          renderSharedNote(note);
          showShareLink(id);
          renderMap(note);
          setStatus("공유 메모를 열었습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      function renderRecent() {
        emptyNote.style.display = state.recent.length ? "none" : "block";
        noteList.innerHTML = state.recent.map(function (item) {
          return '<li class="note-card"><strong>' + esc(item.title) + '</strong><span>' + esc(item.road || item.address) + (item.total ? " · " + item.total : "") + '</span></li>';
        }).join("");
      }

      async function initAuth() {
        var config = await getConfig();
        if (!config.supabaseUrl || !config.supabaseAnonKey) {
          authStatus.textContent = "Supabase anon key를 넣으면 로그인과 내 메모 목록이 켜집니다.";
          renderLocalSavedNotes();
          return;
        }

        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 모듈을 불러오지 못했습니다.";
          renderLocalSavedNotes();
          return;
        }

        var sessionResult = await state.supabaseClient.auth.getSession();
        state.authSession = sessionResult.data && sessionResult.data.session;
        if (!state.authSession && window.location.hash.indexOf("access_token=") !== -1) {
          await new Promise(function (resolve) { setTimeout(resolve, 400); });
          sessionResult = await state.supabaseClient.auth.getSession();
          state.authSession = sessionResult.data && sessionResult.data.session;
        }
        updateAuthUi();
        if (state.authSession) {
          loadMyNotes();
          loadProfile();
        }
        else renderLocalSavedNotes();

        state.supabaseClient.auth.onAuthStateChange(function (_event, session) {
          state.authSession = session;
          updateAuthUi();
          if (session) {
            loadMyNotes();
            loadProfile();
          } else {
            state.profile = null;
            state.profileStats = null;
            renderLocalSavedNotes();
            updateAuthUi();
          }
        });
      }

      async function loadSupabaseAuth(config) {
        if (state.supabaseClient) return true;
        if (!window.supabase) {
          var ok = await new Promise(function (resolve) {
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            script.onload = function () { resolve(true); };
            script.onerror = function () { resolve(false); };
            document.head.appendChild(script);
          });
          if (!ok || !window.supabase) return false;
        }

        state.supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
        return true;
      }

      async function requestLoginLink() {
        if (state.authSession && state.authSession.user) {
          updateAuthUi();
          authStatus.textContent = "이미 로그인되어 있습니다.";
          return;
        }

        var email = (topLoginEmailInput.value || loginEmailInput.value).trim();
        if (!email) {
          authStatus.textContent = "이메일을 입력해주세요.";
          topLoginEmailInput.focus();
          return;
        }

        var config = await getConfig();
        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 설정이 아직 준비되지 않았습니다.";
          return;
        }

        var result = await state.supabaseClient.auth.signInWithOtp({
          email: email,
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });

        authStatus.textContent = result.error ? friendlyAuthError(result.error.message) : "이메일로 로그인 링크를 보냈습니다.";
      }

      async function loginWithGoogle() {
        if (state.authSession && state.authSession.user) {
          updateAuthUi();
          authStatus.textContent = "이미 로그인되어 있습니다.";
          return;
        }

        var config = await getConfig();
        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 설정이 아직 준비되지 않았습니다.";
          return;
        }

        authStatus.textContent = "구글 로그인으로 이동합니다.";
        var result = await state.supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
        if (result.error) authStatus.textContent = friendlyAuthError(result.error.message);
      }

      async function logout() {
        if (state.supabaseClient) await state.supabaseClient.auth.signOut();
        state.authSession = null;
        state.profile = null;
        state.profileStats = null;
        updateAuthUi();
        renderLocalSavedNotes();
      }

      function updateAuthUi() {
        var user = state.authSession && state.authSession.user;
        var label = user ? (user.email || user.id || "") : "";
        var initial = label ? label.slice(0, 1).toUpperCase() : "?";
        var notificationCount = user && state.profileStats ? Number(state.profileStats.notification_count || 0) : 0;

        renderAccountButton(initial, state.profile && state.profile.avatar_url, notificationCount);
        accountEmail.textContent = user ? label : "로그인이 필요합니다";
        accountSummary.hidden = !user;
        if (!user) profileForm.hidden = true;
        topGoogleLoginBtn.hidden = !!user;
        topLoginEmailInput.hidden = !!user;
        topLoginBtn.hidden = !!user;
        topLogoutBtn.hidden = !user;
        logoutBtn.hidden = true;
        loginForm.hidden = true;
        loginBtn.disabled = !!user;
        googleLoginBtn.disabled = !!user;
        topLoginBtn.disabled = !!user;
        topGoogleLoginBtn.disabled = !!user;
        authStatus.textContent = user
          ? "로그인됨: " + (user.email || user.id)
          : "로그인하면 저장한 메모를 계정에서 다시 볼 수 있습니다.";
        renderAccountProfile();
      }

      function toggleAccountMenu() {
        if (accountMenu.hidden) openAccountMenu();
        else closeAccountMenu();
      }

      function openAccountMenu() {
        accountMenu.hidden = false;
        accountButton.setAttribute("aria-expanded", "true");

      function syncEstimateArea(data) {
        var area = estimateAreaFromResult(data);
        if (area) estimateAreaInput.value = area;
      }

      function estimateAreaFromResult(data) {
        var sum = data && data.sum ? data.sum : {};
        return Number(sum.total_pyeong || sum.exclusive_pyeong || 0);
      }

      function renderEstimate() {
        var estimate = calculateEstimate();
        if (!estimate.ok) {
          estimateResult.innerHTML = '<div class="note">' + esc(estimate.message) + '</div>';
          return;
        }

        estimateResult.innerHTML = [
          '<div class="note">' + esc(estimate.label) + '</div>',
          '<div class="estimate-price">' + esc(formatWonRange(estimate.low, estimate.high)) + '</div>',
          '<div class="estimate-lines">',
          estimate.lines.map(function (line) { return '<span>' + esc(line) + '</span>'; }).join(""),
          '<span>현장 상태, 작업 범위, 지역, 주차·엘리베이터 조건에 따라 최종 금액은 달라질 수 있습니다.</span>',
          '</div>'
        ].join("");
      }

      function calculateEstimate() {
        var type = estimateTypeInput.value;
        var area = toNumber(estimateAreaInput.value || estimateAreaFromResult(state.currentResult));
        var visits = Math.max(1, Math.round(toNumber(estimateVisitsInput.value) || 4));
        var bathrooms = Math.max(0, Math.round(toNumber(estimateBathroomsInput.value) || 0));
        var rooms = Math.max(0, Math.round(toNumber(estimateRoomsInput.value) || 0));
        var floors = Math.max(1, Math.round(toNumber(estimateFloorsInput.value) || 1));
        var households = Math.max(0, Math.round(toNumber(estimateHouseholdsInput.value) || 0));
        var dirt = ({ low: 0.92, normal: 1, high: 1.18, severe: 1.38 })[estimateDirtInput.value] || 1;
        var furniture = ({ empty: 1, some: 1.08, many: 1.2 })[estimateFurnitureInput.value] || 1;
        var optionTotal = 0;
        var lines = [];
        var label = estimateTypeInput.options[estimateTypeInput.selectedIndex].text;
        var price = 0;

        if (!area && type !== "villa_stairs") {
          return { ok: false, message: "면적을 조회하거나 평수를 직접 입력해주세요." };
        }

        if (type === "office_regular") {
          price = regularOfficeMonthly(area, visits);
          optionTotal += bathrooms * 8000 + rooms * 4000;
          lines.push("30평 이하 주 1회 월 20만원대, 31~50평 주 1회 월 30만원대 공개 단가를 기준으로 계산했습니다.");
          lines.push("월 방문 " + visits + "회, 화장실 " + bathrooms + "개, 방/회의실 " + rooms + "개 반영");
        } else if (type === "hospital_regular") {
          price = regularOfficeMonthly(area, visits) * 1.35;
          optionTotal += bathrooms * 12000 + rooms * 8000;
          lines.push("병원은 일반 사무실 정기청소에 위생·소독 관리 부담을 35% 가산했습니다.");
          lines.push("월 방문 " + visits + "회, 진료실 " + rooms + "개, 화장실 " + bathrooms + "개 반영");
        } else if (type === "academy_regular") {
          price = regularOfficeMonthly(area, visits) * 1.18;
          optionTotal += bathrooms * 9000 + rooms * 6000;
          lines.push("학원은 일반 사무실 정기청소에 책상·강의실 반복 사용 부담을 18% 가산했습니다.");
          lines.push("월 방문 " + visits + "회, 강의실 " + rooms + "개, 화장실 " + bathrooms + "개 반영");
        } else if (type === "office_movein") {
          price = Math.max(250000, area * 18000);
          optionTotal += bathrooms * 18000 + rooms * 7000;
          lines.push("사업장 청소 공개 단가 평당 15,000~30,000원 범위의 중간값에 가깝게 잡았습니다.");
        } else if (type === "post_construction") {
          price = Math.max(350000, area * 20000);
          optionTotal += rooms * 8000;
          if (!estimateWasteInput.checked) optionTotal += area * 1500;
          lines.push("준공·건축 청소 공개 단가 평당 15,000~25,000원 범위를 기준으로 잡았습니다.");
        } else if (type === "deep_clean") {
          price = Math.max(220000, area * 13000);
          optionTotal += bathrooms * 20000 + rooms * 8000;
          lines.push("대청소는 입주청소보다 낮고 일반 유지청소보다 높은 1회성 단가로 계산했습니다.");
        } else if (type === "apartment_movein") {
          price = Math.max(150000, area * 14000);
          optionTotal += bathrooms * 22000;
          lines.push("아파트 입주청소 공개 단가 평당 10,000~15,500원과 20~30평대 가격표를 기준으로 계산했습니다.");
        } else if (type === "villa_stairs") {
          price = Math.max(35000, floors * 12000 + households * 1200) * Math.max(1, visits / 4);
          optionTotal += estimateWasteInput.checked ? 25000 : 0;
          lines.push("빌라 계단청소 공개 사례인 4~5층 월 1회 35,000원, 5층 월 4회 6~7만원을 기준으로 계산했습니다.");
          lines.push("계단 " + floors + "층, " + households + "세대, 월 방문 " + visits + "회 반영");
        }

        if (estimateWindowInput.checked) optionTotal += Math.max(30000, area * 1200);
        if (estimateFloorCareInput.checked) optionTotal += Math.max(50000, area * 3500);
        if (estimateWasteInput.checked && type !== "villa_stairs") optionTotal += Math.max(30000, area * 2000);

        price = (price + optionTotal) * dirt * furniture;
        if (estimateOffhourInput.checked) price *= 1.15;

        var low = roundToThousand(price * 0.9);
        var high = roundToThousand(price * 1.15);
        lines.unshift(type === "villa_stairs" ? "예상 월 견적입니다." : "예상 1회 견적입니다.");
        if (type.indexOf("regular") !== -1) lines[0] = "예상 월 견적입니다.";
        lines.push("오염도 " + estimateDirtInput.options[estimateDirtInput.selectedIndex].text + ", 집기 " + estimateFurnitureInput.options[estimateFurnitureInput.selectedIndex].text + " 반영");
        return { ok: true, label: label, low: low, high: high, lines: lines };
      }

      function regularOfficeMonthly(area, visits) {
        var once;
        if (area <= 30) once = 200000;
        else if (area <= 50) once = 300000;
        else once = 300000 + (area - 50) * 5000;
        var weeklyVisits = Math.max(0.25, visits / 4);
        var visitFactor = weeklyVisits <= 1 ? weeklyVisits : 1 + (weeklyVisits - 1) * 0.65;
        return once * visitFactor;
      }

      function formatWonRange(low, high) {
        return fmtWon(low) + " ~ " + fmtWon(high);
      }

      function fmtWon(value) {
        var n = Math.round(Number(value || 0));
        if (n >= 10000) return Math.round(n / 10000).toLocaleString("ko-KR") + "만원";
        return n.toLocaleString("ko-KR") + "원";
      }

      function roundToThousand(value) {
        return Math.round(Number(value || 0) / 1000) * 1000;
      }

      function authHeaders(base) {

      function prefillFieldRequest(data) {
        var road = data.road || "";

        if (!fieldSpaceTypeInput.value.trim()) fieldSpaceTypeInput.value = "사무실";

      function publicAreaFromAddress(address) {
        var parts = String(address || "").trim().split(/\s+/).filter(Boolean);
        if (parts.length >= 3) return parts.slice(0, 3).join(" ");
        return parts.join(" ");
      }

          return;
        }

        var message = window.prompt("신청 메시지를 입력해주세요.", "제가 방문해서 견적을 확인할 수 있습니다.");
        if (message === null) return;

        fieldStatus.textContent = "방문 신청을 보내는 중입니다.";
        try {
          var response = await fetch("/api/field-requests", {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({ action: "apply", request_id: id, message: message })
          });

      async function loadBoardPosts() {
        if (!state.authSession) {
          boardStatus.textContent = "게시판은 로그인이 필요합니다.";
          boardList.innerHTML = '<li class="note-card"><span>로그인 후 게시판을 볼 수 있습니다.</span></li>';
          return;
        }
        boardStatus.textContent = "게시글을 불러오는 중입니다.";
        try {
          var response = await fetch("/api/board", { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "게시글을 불러오지 못했습니다.");
          state.boardPosts = data.posts || [];
          state.boardPage = 1;
          renderBoardPosts();
          boardStatus.textContent = "게시글을 불러왔습니다.";
        } catch (error) {
          boardStatus.textContent = error.message;
        }
      }
      function renderBoardPosts() {
        state.boardCurrentPost = null;
        var posts = state.boardPosts || [];
        var total = posts.length;
        if (!total) {
          boardList.innerHTML = '<li class="note-card"><span>\uC544\uC9C1 \uAC8C\uC2DC\uAE00\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.</span></li>';
          return;
        }
        var pageSize = state.boardPageSize || 10;
        var totalPages = Math.max(1, Math.ceil(total / pageSize));
        state.boardPage = Math.min(Math.max(1, state.boardPage || 1), totalPages);
        var start = (state.boardPage - 1) * pageSize;
        var pagePosts = posts.slice(start, start + pageSize);
        boardList.innerHTML = pagePosts.map(function (post, index) {
          var number = total - start - index;
          var meta = ["#" + number, post.author_name || "\uC775\uBA85 \uC0AC\uC6A9\uC790", formatDateTime(post.updated_at || post.created_at), "\uB313\uAE00 " + Number(post.comment_count || 0)].filter(Boolean).join(" | ");
          return '<li class="note-card"><button class="chip" type="button" data-open-board-post="' + escAttr(post.id) + '">\uC5F4\uAE30</button><strong>' + esc(number + '. ' + (post.title || "\uC81C\uBAA9 \uC5C6\uC74C")) + '</strong><span>' + esc(meta) + '</span><span>' + esc(shortText(post.body, 90)) + '</span></li>';
        }).join("") + renderBoardPager(totalPages);
        boardList.querySelectorAll("[data-open-board-post]").forEach(function (button) {
          button.addEventListener("click", function () { loadBoardPostDetail(button.getAttribute("data-open-board-post")); });
        });
        boardList.querySelectorAll("[data-board-page]").forEach(function (button) {
          button.addEventListener("click", function () {
            state.boardPage = Number(button.getAttribute("data-board-page")) || 1;
            renderBoardPosts();
          });
        });
      }

      function renderBoardPager(totalPages) {
        if (totalPages <= 1) return "";
        var buttons = [];
        for (var page = 1; page <= totalPages; page += 1) {
          buttons.push('<button class="chip" type="button" data-board-page="' + page + '"' + (page === state.boardPage ? ' aria-current="page"' : '') + '>' + page + '</button>');
        }
        return '<li class="note-card"><strong>\uBAA9\uB85D \uBC88\uD638</strong><div class="button-row">' + buttons.join("") + '</div></li>';
      }

      async function loadBoardPostDetail(postId) {
        if (!state.authSession) {
          boardStatus.textContent = "게시글 보기는 로그인이 필요합니다.";
          return;
        }
        boardStatus.textContent = "게시글을 불러오는 중입니다.";

      function renderBoardPostDetail(post, comments, viewerUserId, viewerIsAdmin) {
        var mine = post.author_user_id && post.author_user_id === viewerUserId;
        var canModeratePost = mine || viewerIsAdmin;
        var commentHtml = comments.length ? comments.map(function (comment, index) {
          var canDeleteComment = viewerIsAdmin || (comment.author_user_id && comment.author_user_id === viewerUserId);
          var meta = ["\uB313\uAE00 " + (index + 1), comment.author_name || "\uC775\uBA85 \uC0AC\uC6A9\uC790", formatDateTime(comment.created_at)].filter(Boolean).join(" | ");
          return '<li class="note-card"><strong>' + esc(meta) + '</strong><span>' + esc(comment.body || "") + '</span>' + (canDeleteComment ? '<button class="chip" type="button" data-board-comment-delete="' + escAttr(comment.id) + '">\uC0AD\uC81C</button>' : '') + '</li>';
        }).join("") : '<li class="note-card"><span>\uC544\uC9C1 \uB313\uAE00\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.</span></li>';
        boardList.innerHTML = '<li class="note-card"><button class="chip" type="button" data-board-back="1">\uBAA9\uB85D</button>' + (mine ? '<button class="chip" type="button" data-board-edit="' + escAttr(post.id) + '">\uC218\uC815</button>' : '') + (canModeratePost ? '<button class="chip" type="button" data-board-delete="' + escAttr(post.id) + '">\uC0AD\uC81C</button>' : '') + '<strong>' + esc(post.title || "\uC81C\uBAA9 \uC5C6\uC74C") + '</strong><span>' + esc([post.author_name || "\uC775\uBA85 \uC0AC\uC6A9\uC790", formatDateTime(post.created_at)].filter(Boolean).join(" | ")) + '</span><span>' + esc(post.body || "") + '</span></li><li class="note-card"><strong>\uB313\uAE00</strong><textarea id="boardCommentBody" placeholder="\uB313\uAE00\uC744 \uC785\uB825\uD558\uC138\uC694"></textarea><button class="chip" type="button" data-board-comment="' + escAttr(post.id) + '">\uB313\uAE00 \uB4F1\uB85D</button></li>' + commentHtml;
        boardList.querySelectorAll("[data-board-back]").forEach(function (button) { button.addEventListener("click", loadBoardPosts); });
        boardList.querySelectorAll("[data-board-comment]").forEach(function (button) { button.addEventListener("click", function () { createBoardComment(button.getAttribute("data-board-comment")); }); });
        boardList.querySelectorAll("[data-board-edit]").forEach(function (button) { button.addEventListener("click", function () { editBoardPost(button.getAttribute("data-board-edit")); }); });
        boardList.querySelectorAll("[data-board-delete]").forEach(function (button) { button.addEventListener("click", function () { deleteBoardPost(button.getAttribute("data-board-delete")); }); });
        boardList.querySelectorAll("[data-board-comment-delete]").forEach(function (button) { button.addEventListener("click", function () { deleteBoardComment(button.getAttribute("data-board-comment-delete"), post.id); }); });
      }
