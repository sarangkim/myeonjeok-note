<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>면적노트</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f7f4;
      --panel: #ffffff;
      --text: #17201b;
      --muted: #65716b;
      --line: #d8ddd8;
      --soft: #eef3ef;
      --brand: #1e6f5c;
      --brand-strong: #124d40;
      --accent: #b45b34;
      --warn: #8a5b13;
      --danger: #a43d35;
      --shadow: 0 16px 38px rgba(30, 43, 35, 0.1);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
    }

    button,
    input,
    select {
      font: inherit;
      letter-spacing: 0;
    }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: grid;
      gap: 2px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 850;
    }

    .brand span {
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      border: 1px solid #d8c8b5;
      border-radius: 999px;
      background: #fff8ed;
      color: #7b4a1e;
      font-size: 13px;
      font-weight: 750;
      padding: 7px 11px;
      white-space: nowrap;
    }

    .top-actions {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .account-button {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      min-height: 42px;
      border-radius: 50%;
      border-color: var(--line);
      background: #fff;
      color: var(--brand-strong);
      font-size: 14px;
      padding: 0;
      overflow: hidden;
    }

    .account-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .account-button:hover,
    .account-button[aria-expanded="true"] {
      border-color: var(--brand);
      background: #e5f2ee;
    }

    .account-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 20;
      display: grid;
      gap: 8px;
      width: min(300px, calc(100vw - 28px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 12px;
    }

    .account-menu[hidden] {
      display: none;
    }

    .account-email {
      overflow-wrap: anywhere;
      font-size: 13px;
      font-weight: 800;
    }

    .account-summary {
      display: grid;
      gap: 3px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfb;
      padding: 9px;
    }

    .profile-head {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
    }

    .profile-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 50%;
      background: #e5f2ee;
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 850;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .account-summary strong {
      font-size: 14px;
    }

    .account-summary span,
    .profile-status {
      color: var(--muted);
      font-size: 12px;
    }

    .profile-form {
      display: grid;
      gap: 7px;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .profile-form[hidden],
    .side-panel[hidden],
    .field-create[hidden],
    .legacy-field-actions[hidden],
    #notePassword[hidden],
    #shareBox[hidden] {
      display: none;
    }

    .profile-form textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 13px var(--font);
      line-height: 1.5;
      padding: 9px 11px;
      outline: none;
    }

    .search-panel {
      display: grid;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .search-grid {
      display: grid;
      grid-template-columns: minmax(280px, 1.5fr) minmax(150px, 0.45fr) minmax(150px, 0.45fr);
      gap: 10px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    input,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      outline: none;
      padding: 9px 11px;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 111, 92, 0.16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--brand);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 9px 14px;
      white-space: nowrap;
    }

    button:hover {
      background: var(--brand-strong);
    }

    button.secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    button.secondary:hover {
      background: var(--soft);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.6;
    }

    .status {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      text-align: right;
    }

    .status.error {
      color: var(--danger);
    }

    .status.warn {
      color: var(--warn);
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 14px;
      margin-top: 14px;
      align-items: start;
    }

    .results,
    .note-panel {
      display: grid;
      gap: 12px;
    }

    .section,
    .note-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 850;
    }

    .meta-grid,
    .sum-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .sum-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .box {
      min-width: 0;
      border: 1px solid #dfe5df;
      border-radius: 6px;
      background: #f8faf7;
      padding: 10px;
    }

    .box-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .box-value {
      overflow-wrap: anywhere;
      margin-top: 3px;
      font-size: 15px;
      font-weight: 800;
    }

    .sum .box-value {
      font-size: 22px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px;
    }

    .chip:hover,
    .chip.active {
      border-color: var(--brand);
      background: #e5f2ee;
      color: var(--brand-strong);
    }

    .chip.active {
      background: var(--brand);
      color: #fff;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
    }

    table {
      width: 100%;
      min-width: 560px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
      white-space: nowrap;
    }

    th {
      background: var(--soft);
      color: var(--muted);
      font-weight: 850;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
    }

    .loading {
      display: grid;
      place-items: center;
      gap: 12px;
      min-height: 180px;
      text-align: center;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 4px solid #dce8e3;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .note-panel {
      position: sticky;
      top: 14px;
    }

    .note-panel h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 850;
    }

    .side-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .side-tabs button {
      min-height: 38px;
      border-color: var(--line);
      background: #fff;
      color: var(--text);
      font-size: 13px;
      padding: 7px 9px;
    }

    .side-tabs button.active {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    .side-panel {
      display: grid;
      gap: 12px;
    }

    .note-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .note-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfb;
      padding: 10px;
    }

    .note-card strong {
      display: block;
      font-size: 14px;
    }

    .note-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .memo-box {
      display: grid;
      gap: 8px;
    }

    .memo-box textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 14px var(--font);
      line-height: 1.5;
      padding: 10px;
      outline: none;
    }

    .memo-box textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(30, 111, 92, 0.16);
    }

    .share-output {
      display: grid;
      gap: 6px;
      border: 1px solid #d8c8b5;
      border-radius: 6px;
      background: #fff8ed;
      color: #6d431d;
      font-size: 12px;
      padding: 9px;
      overflow-wrap: anywhere;
    }

    .check-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 750;
    }

    .check-row input {
      width: 18px;
      min-height: 18px;
      accent-color: var(--brand);
    }

    .password-panel {
      display: grid;
      gap: 8px;
      border: 1px solid #d8c8b5;
      border-radius: 6px;
      background: #fff8ed;
      padding: 12px;
    }

    .field-form {
      display: grid;
      gap: 8px;
    }

    .field-form textarea {
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font: 14px var(--font);
      line-height: 1.5;
      padding: 10px;
      outline: none;
    }

    .map-card {
      display: grid;
      gap: 10px;
    }

    .map-canvas {
      width: 100%;
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--soft);
      overflow: hidden;
    }

    .map-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
    }

    .map-link {
      color: var(--brand-strong);
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 860px) {
      .actions {
        align-items: stretch;
        flex-direction: column;
      }

      .status {
        text-align: left;
      }

      .topbar {
        align-items: flex-start;
      }

      .badge {
        display: none;
      }

      .search-grid,
      .workspace,
      .meta-grid,
      .sum-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .note-panel {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>면적노트</h1>
        <span>주소, 층, 호를 고르면 전유·공용 면적을 바로 정리합니다.</span>
      </div>
      <div class="top-actions">
        <div class="badge">새 독립 프로젝트</div>
        <button class="account-button" id="accountButton" type="button" aria-label="계정 메뉴" aria-expanded="false">?</button>
        <div class="account-menu" id="accountMenu" hidden>
          <div class="account-email" id="accountEmail">로그인 필요</div>
          <div class="account-summary" id="accountSummary" hidden></div>
          <button id="topGoogleLoginBtn" type="button">구글로 로그인</button>
          <input id="topLoginEmail" type="email" placeholder="이메일 주소">
          <button class="secondary" id="topLoginBtn" type="button">로그인 링크 받기</button>
          <div class="profile-form" id="profileForm" hidden>
            <input id="profileDisplayName" placeholder="이름 또는 담당자명">
            <input id="profileCompanyName" placeholder="업체명">
            <input id="profilePhone" placeholder="연락처">
            <input id="profileServiceArea" placeholder="활동지역 예: 서울 강서구, 마포구">
            <textarea id="profileBio" placeholder="소개 예: 사무실 정기청소와 입주청소를 주로 합니다."></textarea>
            <button id="saveProfileBtn" type="button">프로필 저장</button>
            <div class="profile-status" id="profileStatus"></div>
          </div>
          <button class="secondary" id="topLogoutBtn" type="button" hidden>로그아웃</button>
        </div>
      </div>
    </header>

    <form class="search-panel" id="form">
      <div class="search-grid">
        <label>
          주소
          <input id="address" name="address" autocomplete="street-address" placeholder="예: 서울 중구 세종대로 110">
        </label>
        <label>
          층
          <select id="floor" name="floor">
            <option value="">주소 조회 후 선택</option>
          </select>
        </label>
        <label>
          호
          <input id="ho" name="ho" inputmode="numeric" placeholder="예: 1306">
        </label>
      </div>
      <div class="actions">
        <div class="button-row">
          <button id="searchBtn" type="submit">조회</button>
          <button class="secondary" id="floorBtn" type="button">층 목록</button>
          <button class="secondary" id="resetBtn" type="button">초기화</button>
        </div>
        <div class="status" id="status"></div>
      </div>
    </form>

    <div class="workspace">
      <main class="results" id="results"></main>
      <aside class="note-panel">
        <div class="side-tabs">
          <button class="active" type="button" data-side-view="notes">내 메모</button>
          <button type="button" data-side-view="public">공개 요청</button>
          <button type="button" data-side-view="mine">내 요청</button>
          <button type="button" data-side-view="applied">내 신청</button>
        </div>

        <div class="side-panel" id="notesPanel">
          <h2>내 메모</h2>
          <div class="memo-box">
            <div id="loginForm" hidden>
              <button id="googleLoginBtn" type="button">구글로 로그인</button>
              <div class="note">또는 이메일 링크로 로그인</div>
              <input id="loginEmail" type="email" placeholder="이메일 주소">
              <div class="button-row">
                <button id="loginBtn" type="button">로그인 링크 받기</button>
              </div>
            </div>
            <button class="secondary" id="logoutBtn" type="button" hidden>로그아웃</button>
            <div class="note" id="authStatus">로그인하면 저장한 메모를 계정에서 다시 볼 수 있습니다.</div>
            <ul class="note-list" id="myNoteList"></ul>
          </div>
          <h2>공유 메모</h2>
          <div class="memo-box">
            <textarea id="memo" placeholder="조회한 면적에 대한 메모를 적어두세요."></textarea>
            <label class="check-row">
              <input id="protectNote" type="checkbox">
              비밀번호로 보호
            </label>
            <input id="notePassword" type="password" placeholder="공유 링크 열람 비밀번호" hidden>
            <div class="button-row">
              <button id="saveNoteBtn" type="button">메모 저장</button>
              <button class="secondary" id="copyLinkBtn" type="button">링크 복사</button>
            </div>
            <div class="share-output" id="shareBox" hidden></div>
          </div>
          <h2>최근 조회</h2>
          <ul class="note-list" id="noteList"></ul>
          <div class="note" id="emptyNote">아직 저장된 조회가 없습니다.</div>
        </div>

        <div class="side-panel" id="requestsPanel" hidden>
          <h2 id="requestsPanelTitle">공개 요청</h2>
          <div class="field-form">
            <div class="field-create" id="fieldCreateBlock" hidden>
              <input id="fieldPublicArea" placeholder="공개 위치 예: 서울 강서구 마곡동">
              <input id="fieldCleaningType" placeholder="청소 종류 예: 사무실 정기청소">
              <input id="fieldSpaceType" placeholder="공간 유형 예: 사무실, 상가">
              <input id="fieldReward" placeholder="보상 조건 예: 성사 시 2배 수수료">
              <input id="fieldDate" placeholder="희망 방문일 예: 이번 주 평일">
              <textarea id="fieldDescription" placeholder="요청 내용을 적어주세요. 상세 주소는 승인 전 공개되지 않습니다."></textarea>
              <button id="createFieldRequestBtn" type="button">현장 견적 요청 등록</button>
            </div>
            <div class="legacy-field-actions" hidden>
              <button class="secondary" id="loadFieldRequestsBtn" type="button">공개 요청 보기</button>
              <button class="secondary" id="loadMyFieldRequestsBtn" type="button">내 요청 보기</button>
              <button class="secondary" id="loadAppliedFieldRequestsBtn" type="button">내 신청 보기</button>
            </div>
          </div>
          <div class="note" id="fieldStatus"></div>
          <ul class="note-list" id="fieldRequestList"></ul>
        </div>
      </aside>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      var API_PATH = "/api/area";
      var PYEONG_M2 = 3.305785;
      var form = document.getElementById("form");
      var addressInput = document.getElementById("address");
      var floorSelect = document.getElementById("floor");
      var hoInput = document.getElementById("ho");
      var searchBtn = document.getElementById("searchBtn");
      var floorBtn = document.getElementById("floorBtn");
      var resetBtn = document.getElementById("resetBtn");
      var statusEl = document.getElementById("status");
      var resultsEl = document.getElementById("results");
      var noteList = document.getElementById("noteList");
      var emptyNote = document.getElementById("emptyNote");
      var memoInput = document.getElementById("memo");
      var saveNoteBtn = document.getElementById("saveNoteBtn");
      var copyLinkBtn = document.getElementById("copyLinkBtn");
      var shareBox = document.getElementById("shareBox");
      var protectNoteInput = document.getElementById("protectNote");
      var notePasswordInput = document.getElementById("notePassword");
      var loginEmailInput = document.getElementById("loginEmail");
      var loginBtn = document.getElementById("loginBtn");
      var googleLoginBtn = document.getElementById("googleLoginBtn");
      var logoutBtn = document.getElementById("logoutBtn");
      var authStatus = document.getElementById("authStatus");
      var myNoteList = document.getElementById("myNoteList");
      var loginForm = document.getElementById("loginForm");
      var accountButton = document.getElementById("accountButton");
      var accountMenu = document.getElementById("accountMenu");
      var accountEmail = document.getElementById("accountEmail");
      var accountSummary = document.getElementById("accountSummary");
      var topLoginEmailInput = document.getElementById("topLoginEmail");
      var topLoginBtn = document.getElementById("topLoginBtn");
      var topGoogleLoginBtn = document.getElementById("topGoogleLoginBtn");
      var topLogoutBtn = document.getElementById("topLogoutBtn");
      var profileForm = document.getElementById("profileForm");
      var profileDisplayNameInput = document.getElementById("profileDisplayName");
      var profileCompanyNameInput = document.getElementById("profileCompanyName");
      var profilePhoneInput = document.getElementById("profilePhone");

      initAuth();
      loadSharedNoteFromUrl();

      async function requestArea(params) {
        setBusy(true);
        showLoading();
        try {
          var url = new URL(API_PATH, window.location.origin);
          Object.keys(params).forEach(function (key) {
            if (params[key] !== undefined && params[key] !== null && String(params[key]).trim() !== "") {
              url.searchParams.set(key, String(params[key]).trim());
            }
          });

          var response = await fetch(url.toString(), { method: "GET" });
          var data = await response.json().catch(function () {
            return null;
          });
          if (!response.ok || !data || data.ok === false) {
            throw new Error((data && data.message) || "조회에 실패했습니다.");
          }
          return data;
        } finally {
          setBusy(false);
        }
      }

      async function loadSummary() {
        var address = addressInput.value.trim();
        if (!address) {
          setStatus("주소를 먼저 입력해주세요.", "error");
          addressInput.focus();
          return;
        }

        setStatus("주소와 층 목록을 조회하는 중입니다.");
        try {
          var data = await requestArea({ address: address });
          state.lastAddress = address;
          state.prefetch = data;
          setFloors(data.floors || []);
          renderSummary(data);
          remember(data, "층 목록");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("층 목록을 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function loadFloor(floor) {
        var address = addressInput.value.trim();
        if (!address || !floor) return;
        setStatus("층 정보를 조회하는 중입니다.");
        hoInput.value = "";
        try {
          var data = hasPrefetch(address) ? buildFloorFromPrefetch(floor) : await requestArea({ address: address, floor: floor });
          renderFloor(data);
          remember(data, "층");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("층 정보를 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function search() {
        var address = addressInput.value.trim();
        var floor = floorSelect.value;
        var ho = hoInput.value.trim();
        if (!address) {
          setStatus("주소를 입력해주세요.", "error");
          addressInput.focus();
          return;
        }
        if (!floor && !ho) {
          await loadSummary();
          return;
        }
        if (!floor && state.lastAddress !== address) {
          await loadSummary();
          floor = floorSelect.value;
        }

        setStatus("면적 데이터를 조회하는 중입니다.");
        try {
          var data = hasPrefetch(address)
            ? (ho ? buildHoFromPrefetch(floor, ho) : buildFloorFromPrefetch(floor))
            : await requestArea({ address: address, floor: floor, ho: ho });
          if (data.mode === "floor") renderFloor(data);
          else if (data.mode === "ho_breakdown") renderHoBreakdown(data);
          else renderFallback(data);
          remember(data, ho ? "호" : "층");
          setCurrentResult(data);
          prefillFieldRequest(data);
          renderMap(data);
          setStatus("조회가 완료되었습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      function setFloors(floors) {
        state.floors = floors || [];
        floorSelect.innerHTML = "";
        var first = document.createElement("option");
        first.value = "";
        first.textContent = state.floors.length ? "층 선택" : "주소 조회 후 선택";
        floorSelect.appendChild(first);
        state.floors.forEach(function (floor) {
          var option = document.createElement("option");
          option.value = floor.key || floor.no;
          option.textContent = floor.label || floor.no + "층";
          floorSelect.appendChild(option);
        });
      }

      function setBusy(isBusy) {
        searchBtn.disabled = isBusy;
        floorBtn.disabled = isBusy;
      }

      function setStatus(message, type) {
        statusEl.className = "status" + (type ? " " + type : "");
        statusEl.textContent = message || "";
      }

      function showLoading() {
        resultsEl.innerHTML = '<section class="section loading" aria-live="polite"><div class="spinner"></div><div><strong>공공데이터를 불러오는 중입니다</strong><div class="note">건축물대장 데이터 양에 따라 잠시 걸릴 수 있습니다.</div></div></section>';
      }

      function hasPrefetch(address) {
        return !!(
          state.prefetch &&
          state.lastAddress === address &&
          state.prefetch.all_data &&
          Array.isArray(state.prefetch.all_data.floor_items)
        );
      }

      function buildFloorFromPrefetch(floor) {
        var base = state.prefetch || {};
        var all = base.all_data || {};
        var floorItems = (all.floor_items || []).filter(function (item) {
          return sameFloorItem(item, floor);
        });
        var hoIndex = buildHoIndex(all.expos_items || [], all.pub_items || [], floor);
        var hoList = Object.keys(hoIndex).sort(function (a, b) {
          return Number(a) - Number(b);
        });
        var floorExclusive = findFloorExclusiveFromItems(all.pub_items || [], floor);
        return {
          ok: true,
          build: base.build,
          mode: "floor",
          input: { address: addressInput.value.trim(), floor: floor, ho: null },
          road: base.road || "",
          jibun: base.jibun || "",
          keys: base.keys || {},
          floor_items: floorItems.map(toClientFloorItem),
          ho_list: hoList,
          ho_list_note: hoList.length ? "" : "해당 층에서 호 목록을 찾지 못했습니다.",
          ho_index: hoIndex,
          floor_exclusive_m2: floorExclusive ? floorExclusive.m2 : null,
          floor_exclusive_pyeong: floorExclusive ? round2(floorExclusive.m2 / PYEONG_M2) : null,
          floor_exclusive_note: floorExclusive ? floorExclusive.note : null
        };
      }

      function buildHoFromPrefetch(floor, ho) {
        var base = state.prefetch || {};
        var all = base.all_data || {};
        var wantHoNorm = normalizeHo(ho);
        var hoRows = findRowsByFloorAndHo(all.pub_items || [], floor, wantHoNorm);
        if (hoRows.length) return buildHoBreakdownLocal(base, floor, ho, wantHoNorm, hoRows);

        var target = findRowsByFloorAndHo(all.expos_items || [], floor, wantHoNorm)[0] || null;
        var areaM2 = target ? toNumber(target.area) : 0;
        if (areaM2 > 0) {
          return {
            ok: true,
            build: base.build,
            mode: "exposInfo_fallback",
            input: { address: addressInput.value.trim(), floor: floor, ho: ho },
            road: base.road || "",
            jibun: base.jibun || "",
            keys: base.keys || {},
            sum: areaSummary(areaM2, null),
            note: "전유/공용 breakdown 데이터가 없어서 전유부 면적으로 안내합니다."
          };
        }

        var floorExclusive = findFloorExclusiveFromItems(all.pub_items || [], floor);
        if (floorExclusive) {
          return {
            ok: true,
            build: base.build,
            mode: "floorExclusive_fallback",
            input: { address: addressInput.value.trim(), floor: floor, ho: ho },
            road: base.road || "",
            jibun: base.jibun || "",
            keys: base.keys || {},
            sum: areaSummary(floorExclusive.m2, null),
            note: "해당 호 데이터가 없어 같은 층의 전유 면적으로 안내합니다.",
            floor_exclusive_note: floorExclusive.note
          };
        }
        throw new Error("해당 층/호 면적 데이터를 찾지 못했습니다.");
      }

      function renderSummary(data) {
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">층 목록</h2>',
          renderFloorChips(data.floors || []),
          '</section>'
        ].join("");
        bindFloorChips();
      }

      function renderFloor(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">층 정보</h2>',
          renderFloorItems(data.floor_items || []),
          renderFloorExclusive(data),
          '</section>',
          '<section class="section"><h2 class="section-title">호 목록</h2>',
          renderHoChips(data.ho_list || []),
          data.ho_list_note ? '<div class="note">' + esc(data.ho_list_note) + '</div>' : '',
          '</section>'
        ].join("");
        bindHoChips();
      }

      function renderHoBreakdown(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        var floorData = hasPrefetch(addressInput.value.trim()) ? buildFloorFromPrefetch(data.input.floor) : null;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">면적 합계 <span>' + esc((data.input && data.input.ho ? data.input.ho : hoInput.value) + "호") + '</span></h2>',
          renderSum(data.sum || {}),
          data.ho_matched && data.ho_matched.note ? '<div class="note">' + esc(data.ho_matched.note) + '</div>' : '',
          '</section>',
          '<section class="section"><h2 class="section-title">전유·공용 breakdown</h2>',
          renderBreakdown(data.breakdown || []),
          data.note ? '<div class="note">' + esc(data.note) + '</div>' : '',
          '</section>',
          renderStickyHoList(floorData, data.input && data.input.ho)
        ].join("");
        bindHoChips();
      }

      function renderFallback(data) {
        if (data.input && data.input.floor) floorSelect.value = data.input.floor;
        var floorData = hasPrefetch(addressInput.value.trim()) ? buildFloorFromPrefetch(data.input.floor) : null;
        resultsEl.innerHTML = [
          renderAddress(data),
          '<section class="section"><h2 class="section-title">면적 결과 <span>' + esc((data.input && data.input.ho ? data.input.ho : hoInput.value) + "호") + '</span></h2>',
          renderSum(data.sum || {}),
          data.note ? '<div class="note">' + esc(data.note) + '</div>' : '',
          data.floor_exclusive_note ? '<div class="note">' + esc(data.floor_exclusive_note) + '</div>' : '',
          '</section>',
          renderStickyHoList(floorData, data.input && data.input.ho)
        ].join("");
        bindHoChips();
      }

      function renderAddress(data) {
        return [
          '<section class="section"><h2 class="section-title">주소</h2><div class="meta-grid">',
          box("도로명", data.road || "-"),
          box("지번", data.jibun || "-"),
          '</div></section>',
          renderMapShell(data)
        ].join("");
      }

      function renderMapShell(data) {
        var address = data.road || data.jibun || data.address || "";
        if (!address || address === "-") return "";
        return [
          '<section class="section map-card">',
          '<h2 class="section-title">지도</h2>',
          '<div class="map-canvas" id="kakaoMap"></div>',
          '<div class="map-actions">',
          '<div class="note" id="mapStatus">지도를 준비하는 중입니다.</div>',
          '<a class="map-link" target="_blank" rel="noopener" href="' + escAttr(kakaoSearchUrl(address)) + '">카카오맵에서 보기</a>',
          '</div>',
          '</section>'
        ].join("");
      }

      function renderFloorChips(floors) {
        if (!floors.length) return '<div class="note">조회된 층이 없습니다.</div>';
        return '<div class="chips">' + floors.map(function (floor) {
          return '<button class="chip" type="button" data-floor="' + escAttr(floor.key || floor.no) + '">' + esc(floor.label || floor.no + "층") + '</button>';
        }).join("") + '</div>';
      }

      function renderHoChips(hoList, activeHo) {
        if (!hoList.length) return '<div class="note">조회된 호 목록이 없습니다. 호를 직접 입력해 조회할 수 있습니다.</div>';
        var activeNorm = normalizeHo(activeHo || hoInput.value);
        return '<div class="chips">' + hoList.map(function (ho) {
          var active = activeNorm && normalizeHo(ho) === activeNorm ? " active" : "";
          return '<button class="chip' + active + '" type="button" data-ho="' + escAttr(ho) + '">' + esc(ho + "호") + '</button>';
        }).join("") + '</div>';
      }

      function renderStickyHoList(floorData, activeHo) {
        if (!floorData) return "";
        return [
          '<section class="section"><h2 class="section-title">같은 층 호 목록</h2>',
          renderHoChips(floorData.ho_list || [], activeHo),
          floorData.ho_list_note ? '<div class="note">' + esc(floorData.ho_list_note) + '</div>' : '',
          '</section>'
        ].join("");
      }

      function renderFloorItems(items) {
        if (!items.length) return '<div class="note">층 면적 항목이 없습니다.</div>';
        return [
          '<div class="table-wrap"><table><thead><tr><th>구분</th><th>용도</th><th>상세</th><th class="num">m²</th><th class="num">평</th></tr></thead><tbody>',
          items.map(function (item) {
            return '<tr><td>' + esc(item.gb) + '</td><td>' + esc(item.use) + '</td><td>' + esc(item.detail) + '</td><td class="num">' + fmt(item.area_m2) + '</td><td class="num">' + fmt(item.area_pyeong) + '</td></tr>';
          }).join(""),
          '</tbody></table></div>'
        ].join("");
      }

      function renderFloorExclusive(data) {
        if (!data.floor_exclusive_m2) return "";
        return '<div class="sum-grid sum">' + box("층 전유 m²", data.floor_exclusive_m2) + box("층 전유 평", data.floor_exclusive_pyeong) + box("기준", data.floor_exclusive_note || "-") + '</div>';
      }

      function renderSum(sum) {
        return [
          '<div class="sum-grid sum">',
          box("전유 m²", sum.exclusive_m2),
          box("공용 m²", sum.shared_m2),
          box("합계 m²", sum.total_m2),
          box("전유 평", sum.exclusive_pyeong),
          box("공용 평", sum.shared_pyeong),
          box("합계 평", sum.total_pyeong),
          '</div>'
        ].join("");
      }

      function renderBreakdown(rows) {
        if (!rows.length) return '<div class="note">breakdown 항목이 없습니다.</div>';
        return [
          '<div class="table-wrap"><table><thead><tr><th>구분</th><th>층</th><th>용도</th><th class="num">m²</th><th class="num">평</th></tr></thead><tbody>',
          rows.map(function (row) {
            return '<tr><td>' + esc(row.gb || "-") + '</td><td>' + esc(row.flrNm || "-") + '</td><td>' + esc(row.use || "-") + '</td><td class="num">' + fmt(row.area_m2) + '</td><td class="num">' + fmt(row.area_pyeong) + '</td></tr>';
          }).join(""),
          '</tbody></table></div>'
        ].join("");
      }

      function bindFloorChips() {
        resultsEl.querySelectorAll("[data-floor]").forEach(function (button) {
          button.addEventListener("click", function () {
            floorSelect.value = button.getAttribute("data-floor");
            loadFloor(floorSelect.value);
          });
        });
      }

      function bindHoChips() {
        resultsEl.querySelectorAll("[data-ho]").forEach(function (button) {
          button.addEventListener("click", function () {
            hoInput.value = button.getAttribute("data-ho");
            search();
          });
        });
      }

      function remember(data, type) {
        var input = data.input || {};
        var title = [input.floor, input.ho ? input.ho + "호" : ""].filter(Boolean).join(" ");
        var item = {
          address: input.address || addressInput.value.trim(),
          title: title || type,
          road: data.road || "",
          total: data.sum && data.sum.total_pyeong ? data.sum.total_pyeong + "평" : ""
        };
        state.recent = [item].concat(state.recent).slice(0, 5);
        renderRecent();
      }

      async function loadSharedNoteFromUrl() {
        var id = new URLSearchParams(window.location.search).get("note");
        if (!id) return;

        setStatus("공유 메모를 불러오는 중입니다.");
        try {
          var response = await fetch("/api/notes?id=" + encodeURIComponent(id), { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "공유 메모를 불러오지 못했습니다.");

          if (data.password_required) {
            state.currentNote = data.note;
            renderLockedNote(data.note);
            showShareLink(id);
            setStatus("비밀번호가 필요한 메모입니다.");
            return;
          }

          var note = data.note;
          state.currentNote = note;
          state.currentResult = note.result || null;
          addressInput.value = note.address || note.road || "";
          hoInput.value = note.ho || "";
          memoInput.value = note.memo || "";
          protectNoteInput.checked = !!note.has_password;
          notePasswordInput.hidden = !protectNoteInput.checked;
          renderSharedNote(note);
          showShareLink(id);
          renderMap(note);
          setStatus("공유 메모를 불러왔습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function saveSharedNote() {
        if (!state.currentResult) {
          setStatus("먼저 주소나 호를 조회해주세요.", "error");
          return;
        }

        var result = state.currentResult || {};
        var input = result.input || {};
        var id = state.currentNote && state.currentNote.id;
        var editToken = id ? localStorage.getItem("myeonjeok_note_edit_" + id) : "";
        var payload = {
          id: id,
          edit_token: editToken,
          address: input.address || addressInput.value.trim(),
          road: result.road || "",
          jibun: result.jibun || "",
          floor: input.floor || floorSelect.value || "",
          ho: input.ho || hoInput.value.trim() || "",
          memo: memoInput.value,
          result: result,
          password: protectNoteInput.checked ? notePasswordInput.value : ""
        };

        setStatus("메모를 저장하는 중입니다.");
        try {
          var response = await fetch("/api/notes", {
            method: id && editToken ? "PATCH" : "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify(payload)
          });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "메모 저장에 실패했습니다.");

          state.currentNote = data.note;
          if (data.edit_token) localStorage.setItem("myeonjeok_note_edit_" + data.note.id, data.edit_token);
          showShareLink(data.note.id);
          rememberSavedNote(data.note);
          if (state.authSession) loadMyNotes();
          setStatus("메모를 저장했습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      async function copyShareLink() {
        if (!state.currentNote || !state.currentNote.id) {
          setStatus("복사할 공유 링크가 없습니다.", "error");
          return;
        }

        var link = shareLink(state.currentNote.id);
        try {
          await navigator.clipboard.writeText(link);
          setStatus("공유 링크를 복사했습니다.");
        } catch {
          showShareLink(state.currentNote.id);
          setStatus("아래 공유 링크를 직접 복사해주세요.", "warn");
        }
      }

      function setCurrentResult(data) {
        state.currentResult = data;
        state.currentNote = null;
        shareBox.hidden = true;
        shareBox.textContent = "";
      }

      function showShareLink(id) {
        shareBox.hidden = false;
        shareBox.textContent = shareLink(id);
      }

      function shareLink(id) {
        return window.location.origin + window.location.pathname + "?note=" + encodeURIComponent(id);
      }

      function renderSharedNote(note) {
        var result = note.result || {};
        var parts = [renderAddress(note)];
        if (result.sum) {
          parts.push('<section class="section"><h2 class="section-title">저장된 면적</h2>' + renderSum(result.sum) + '</section>');
        }
        if (Array.isArray(result.breakdown)) {
          parts.push('<section class="section"><h2 class="section-title">저장된 breakdown</h2>' + renderBreakdown(result.breakdown) + '</section>');
        }
        parts.push('<section class="section"><h2 class="section-title">메모</h2><div class="note">' + esc(note.memo || "저장된 메모가 없습니다.") + '</div></section>');
        resultsEl.innerHTML = parts.join("");
      }

      function renderLockedNote(note) {
        resultsEl.innerHTML = [
          '<section class="section password-panel">',
          '<h2 class="section-title">비밀번호가 필요한 메모</h2>',
          '<div class="note">공유받은 비밀번호를 입력하면 저장된 면적과 메모를 볼 수 있습니다.</div>',
          '<input id="unlockPassword" type="password" placeholder="비밀번호">',
          '<button id="unlockBtn" type="button">열람하기</button>',
          '</section>'
        ].join("");

        document.getElementById("unlockBtn").addEventListener("click", function () {
          unlockSharedNote(note.id, document.getElementById("unlockPassword").value);
        });
      }

      async function unlockSharedNote(id, password) {
        if (!password) {
          setStatus("비밀번호를 입력해주세요.", "error");
          return;
        }

        setStatus("비밀번호를 확인하는 중입니다.");
        try {
          var response = await fetch("/api/notes?id=" + encodeURIComponent(id) + "&password=" + encodeURIComponent(password), { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "메모를 열지 못했습니다.");
          if (data.password_required) {
            setStatus("비밀번호가 맞지 않습니다.", "error");
            return;
          }

          var note = data.note;
          state.currentNote = note;
          state.currentResult = note.result || null;
          memoInput.value = note.memo || "";
          protectNoteInput.checked = !!note.has_password;
          notePasswordInput.hidden = !protectNoteInput.checked;
          renderSharedNote(note);
          showShareLink(id);
          renderMap(note);
          setStatus("공유 메모를 열었습니다.");
        } catch (error) {
          setStatus(error.message, "error");
        }
      }

      function renderRecent() {
        emptyNote.style.display = state.recent.length ? "none" : "block";
        noteList.innerHTML = state.recent.map(function (item) {
          return '<li class="note-card"><strong>' + esc(item.title) + '</strong><span>' + esc(item.road || item.address) + (item.total ? " · " + item.total : "") + '</span></li>';
        }).join("");
      }

      async function initAuth() {
        var config = await getConfig();
        if (!config.supabaseUrl || !config.supabaseAnonKey) {
          authStatus.textContent = "Supabase anon key를 넣으면 로그인과 내 메모 목록이 켜집니다.";
          renderLocalSavedNotes();
          return;
        }

        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 모듈을 불러오지 못했습니다.";
          renderLocalSavedNotes();
          return;
        }

        var sessionResult = await state.supabaseClient.auth.getSession();
        state.authSession = sessionResult.data && sessionResult.data.session;
        if (!state.authSession && window.location.hash.indexOf("access_token=") !== -1) {
          await new Promise(function (resolve) { setTimeout(resolve, 400); });
          sessionResult = await state.supabaseClient.auth.getSession();
          state.authSession = sessionResult.data && sessionResult.data.session;
        }
        updateAuthUi();
        if (state.authSession) {
          loadMyNotes();
          loadProfile();
        }
        else renderLocalSavedNotes();

        state.supabaseClient.auth.onAuthStateChange(function (_event, session) {
          state.authSession = session;
          updateAuthUi();
          if (session) {
            loadMyNotes();
            loadProfile();
          } else {
            state.profile = null;
            state.profileStats = null;
            renderLocalSavedNotes();
            updateAuthUi();
          }
        });
      }

      async function loadSupabaseAuth(config) {
        if (state.supabaseClient) return true;
        if (!window.supabase) {
          var ok = await new Promise(function (resolve) {
            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
            script.onload = function () { resolve(true); };
            script.onerror = function () { resolve(false); };
            document.head.appendChild(script);
          });
          if (!ok || !window.supabase) return false;
        }

        state.supabaseClient = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
        return true;
      }

      async function requestLoginLink() {
        if (state.authSession && state.authSession.user) {
          updateAuthUi();
          authStatus.textContent = "이미 로그인되어 있습니다.";
          return;
        }

        var email = (topLoginEmailInput.value || loginEmailInput.value).trim();
        if (!email) {
          authStatus.textContent = "이메일을 입력해주세요.";
          topLoginEmailInput.focus();
          return;
        }

        var config = await getConfig();
        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 설정이 아직 준비되지 않았습니다.";
          return;
        }

        var result = await state.supabaseClient.auth.signInWithOtp({
          email: email,
          options: { emailRedirectTo: window.location.origin + window.location.pathname }
        });

        authStatus.textContent = result.error ? friendlyAuthError(result.error.message) : "이메일로 로그인 링크를 보냈습니다.";
      }

      async function loginWithGoogle() {
        if (state.authSession && state.authSession.user) {
          updateAuthUi();
          authStatus.textContent = "이미 로그인되어 있습니다.";
          return;
        }

        var config = await getConfig();
        var loaded = await loadSupabaseAuth(config);
        if (!loaded) {
          authStatus.textContent = "로그인 설정이 아직 준비되지 않았습니다.";
          return;
        }

        authStatus.textContent = "구글 로그인으로 이동합니다.";
        var result = await state.supabaseClient.auth.signInWithOAuth({
          provider: "google",
          options: { redirectTo: window.location.origin + window.location.pathname }
        });
        if (result.error) authStatus.textContent = friendlyAuthError(result.error.message);
      }

      async function logout() {
        if (state.supabaseClient) await state.supabaseClient.auth.signOut();
        state.authSession = null;
        state.profile = null;
        state.profileStats = null;
        updateAuthUi();
        renderLocalSavedNotes();
      }

      function updateAuthUi() {
        var user = state.authSession && state.authSession.user;
        var label = user ? (user.email || user.id || "") : "";
        var initial = label ? label.slice(0, 1).toUpperCase() : "?";

        renderAccountButton(initial, state.profile && state.profile.avatar_url);
        accountEmail.textContent = user ? label : "로그인이 필요합니다";
        accountSummary.hidden = !user;
        if (!user) profileForm.hidden = true;
        topGoogleLoginBtn.hidden = !!user;
        topLoginEmailInput.hidden = !!user;
        topLoginBtn.hidden = !!user;
        topLogoutBtn.hidden = !user;
        logoutBtn.hidden = true;
        loginForm.hidden = true;
        loginBtn.disabled = !!user;
        googleLoginBtn.disabled = !!user;
        topLoginBtn.disabled = !!user;
        topGoogleLoginBtn.disabled = !!user;
        authStatus.textContent = user
          ? "로그인됨: " + (user.email || user.id)
          : "로그인하면 저장한 메모를 계정에서 다시 볼 수 있습니다.";
        renderAccountProfile();
      }

      function toggleAccountMenu() {
        if (accountMenu.hidden) openAccountMenu();
        else closeAccountMenu();
      }

      function openAccountMenu() {
        accountMenu.hidden = false;
        accountButton.setAttribute("aria-expanded", "true");
      }

      function closeAccountMenu() {
        accountMenu.hidden = true;
        accountButton.setAttribute("aria-expanded", "false");
        profileForm.hidden = true;
      }

      function closeAccountMenuOnOutsideClick(event) {
        if (accountMenu.hidden) return;
        if (accountMenu.contains(event.target) || accountButton.contains(event.target)) return;
        closeAccountMenu();
      }

      function selectSideView(view) {
        sideTabButtons.forEach(function (button) {
          button.classList.toggle("active", button.getAttribute("data-side-view") === view);
        });

        var isNotes = view === "notes";
        notesPanel.hidden = !isNotes;
        requestsPanel.hidden = isNotes;
        fieldCreateBlock.hidden = view !== "mine";

        if (view === "public") {
          requestsPanelTitle.textContent = "공개 요청";
          loadFieldRequests();
        } else if (view === "mine") {
          requestsPanelTitle.textContent = "내 요청";
          loadMyFieldRequests();
        } else if (view === "applied") {
          requestsPanelTitle.textContent = "내 신청";
          loadAppliedFieldRequests();
        }
      }

      async function loadProfile() {
        if (!state.authSession) return;
        try {
          var response = await fetch("/api/profile", { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "프로필을 불러오지 못했습니다.");
          state.profile = data.profile || null;
          state.profileStats = data.stats || null;
          fillProfileForm();
          profileForm.hidden = true;
          renderAccountProfile();
        } catch (error) {
          profileStatus.textContent = error.message;
        }
      }

      async function saveProfile() {
        if (!state.authSession) {
          profileStatus.textContent = "로그인이 필요합니다.";
          return;
        }

        profileStatus.textContent = "프로필을 저장하는 중입니다.";
        try {
          var response = await fetch("/api/profile", {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({
              display_name: profileDisplayNameInput.value,
              company_name: profileCompanyNameInput.value,
              phone: profilePhoneInput.value,
              service_area: profileServiceAreaInput.value,
              bio: profileBioInput.value
            })
          });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "프로필 저장에 실패했습니다.");
          state.profile = data.profile || null;
          state.profileStats = data.stats || null;
          fillProfileForm();
          profileForm.hidden = true;
          renderAccountProfile();
          profileStatus.textContent = "프로필을 저장했습니다.";
        } catch (error) {
          profileStatus.textContent = error.message;
        }
      }

      function fillProfileForm() {
        var profile = state.profile || {};
        profileDisplayNameInput.value = profile.display_name || "";
        profileCompanyNameInput.value = profile.company_name || "";
        profilePhoneInput.value = profile.phone || "";
        profileServiceAreaInput.value = profile.service_area || "";
        profileBioInput.value = profile.bio || "";
      }

      function renderAccountProfile() {
        var user = state.authSession && state.authSession.user;
        if (!user) {
          accountSummary.innerHTML = "";
          renderAccountButton("?", "");
          return;
        }

        var profile = state.profile || {};
        var title = profile.company_name || profile.display_name || user.email || "프로필 미입력";
        var line = [profile.display_name, profile.service_area].filter(Boolean).join(" · ");
        var contact = [profile.phone, profile.bio].filter(Boolean).join(" · ");
        accountSummary.innerHTML =
          '<div class="profile-head">' +
          renderAvatar(profile.avatar_url, title) +
          '<div><strong>' + esc(title) + '</strong>' +
          (line ? '<span>' + esc(line) + '</span>' : '<span>프로필을 입력하면 신청자에게 더 잘 보입니다.</span>') +
          '</div></div>' +
          (contact ? '<span>' + esc(contact) + '</span>' : '') +
          '<span>' + esc(applicantStatsText(state.profileStats)) + '</span>' +
          '<button class="secondary" id="editProfileBtn" type="button"' + (profileForm.hidden ? '' : ' hidden') + '>프로필 수정</button>';
        document.getElementById("editProfileBtn").addEventListener("click", function () {
          profileStatus.textContent = "";
          profileForm.hidden = false;
          renderAccountProfile();
        });
      }

      function renderAccountButton(initial, avatarUrl) {
        accountButton.innerHTML = avatarUrl
          ? '<img src="' + escAttr(avatarUrl) + '" alt="">'
          : esc(initial || "?");
      }

      function friendlyAuthError(message) {
        var text = String(message || "");
        if (text.toLowerCase().includes("rate limit")) {
          return "로그인 메일을 너무 자주 요청했습니다. 잠시 후 다시 시도해주세요.";
        }
        return text || "로그인 링크 요청에 실패했습니다.";
      }

      function authHeaders(base) {
        var headers = base ? Object.assign({}, base) : {};
        if (state.authSession && state.authSession.access_token) {
          headers.Authorization = "Bearer " + state.authSession.access_token;
        }
        return headers;
      }

      async function loadMyNotes() {
        try {
          var response = await fetch("/api/notes?mine=1", { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "내 메모를 불러오지 못했습니다.");
          renderMyNotes(data.notes || []);
        } catch (error) {
          authStatus.textContent = error.message;
        }
      }

      function renderMyNotes(notes) {
        if (!notes.length) {
          myNoteList.innerHTML = '<li class="note-card"><span>저장한 메모가 없습니다.</span></li>';
          return;
        }

        myNoteList.innerHTML = notes.map(function (note) {
          return '<li class="note-card"><button class="chip" type="button" data-open-note="' + escAttr(note.id) + '">' + esc(note.ho ? note.ho + "호" : "메모") + '</button><strong>' + esc(note.road || note.address || "-") + '</strong><span>' + esc(note.has_password ? "비밀번호 보호" : "공개") + '</span></li>';
        }).join("");

        myNoteList.querySelectorAll("[data-open-note]").forEach(function (button) {
          button.addEventListener("click", function () {
            openSavedNote(button.getAttribute("data-open-note"));
          });
        });
      }

      function rememberSavedNote(note) {
        var ids = JSON.parse(localStorage.getItem("myeonjeok_note_ids") || "[]");
        ids = [note.id].concat(ids.filter(function (id) { return id !== note.id; })).slice(0, 30);
        localStorage.setItem("myeonjeok_note_ids", JSON.stringify(ids));
      }

      async function renderLocalSavedNotes() {
        var ids = JSON.parse(localStorage.getItem("myeonjeok_note_ids") || "[]");
        if (!ids.length) {
          myNoteList.innerHTML = '<li class="note-card"><span>이 브라우저에 저장된 메모가 없습니다.</span></li>';
          return;
        }

        myNoteList.innerHTML = ids.map(function (id) {
          return '<li class="note-card"><button class="chip" type="button" data-open-note="' + escAttr(id) + '">메모 열기</button><span>' + esc(id) + '</span></li>';
        }).join("");
        myNoteList.querySelectorAll("[data-open-note]").forEach(function (button) {
          button.addEventListener("click", function () {
            openSavedNote(button.getAttribute("data-open-note"));
          });
        });
      }

      async function openSavedNote(id) {
        var response = await fetch("/api/notes?id=" + encodeURIComponent(id), { headers: authHeaders() });
        var data = await response.json().catch(function () { return null; });
        if (!response.ok || !data || data.ok === false) {
          setStatus((data && data.message) || "메모를 열지 못했습니다.", "error");
          return;
        }
        if (data.password_required) {
          state.currentNote = data.note;
          renderLockedNote(data.note);
          showShareLink(id);
          setStatus("비밀번호가 필요한 메모입니다.");
          return;
        }

        var note = data.note;
        state.currentNote = note;
        state.currentResult = note.result || null;
        memoInput.value = note.memo || "";
        protectNoteInput.checked = !!note.has_password;
        notePasswordInput.hidden = !protectNoteInput.checked;
        renderSharedNote(note);
        showShareLink(id);
        renderMap(note);
        setStatus("메모를 열었습니다.");
      }

      function prefillFieldRequest(data) {
        var road = data.road || "";
        var publicArea = publicAreaFromAddress(road || data.jibun || data.address || "");
        if (publicArea && !fieldPublicAreaInput.value.trim()) fieldPublicAreaInput.value = publicArea;
        if (!fieldSpaceTypeInput.value.trim()) fieldSpaceTypeInput.value = "사무실";
      }

      function publicAreaFromAddress(address) {
        var parts = String(address || "").trim().split(/\s+/).filter(Boolean);
        if (parts.length >= 3) return parts.slice(0, 3).join(" ");
        return parts.join(" ");
      }

      async function createFieldRequest() {
        if (!state.authSession) {
          fieldStatus.textContent = "현장 요청 등록은 로그인이 필요합니다.";
          return;
        }
        if (!state.currentResult) {
          fieldStatus.textContent = "먼저 주소와 면적을 조회해주세요.";
          return;
        }

        var result = state.currentResult || {};
        var input = result.input || {};
        var payload = {
          address: input.address || addressInput.value.trim(),
          road: result.road || "",
          jibun: result.jibun || "",
          floor: input.floor || floorSelect.value || "",
          ho: input.ho || hoInput.value.trim() || "",
          public_area: fieldPublicAreaInput.value.trim(),
          cleaning_type: fieldCleaningTypeInput.value.trim(),
          space_type: fieldSpaceTypeInput.value.trim(),
          area_pyeong: result.sum && result.sum.total_pyeong ? result.sum.total_pyeong : null,
          reward_text: fieldRewardInput.value.trim(),
          preferred_date: fieldDateInput.value.trim(),
          description: fieldDescriptionInput.value.trim()
        };

        if (!payload.public_area || !payload.cleaning_type) {
          fieldStatus.textContent = "공개 위치와 청소 종류를 입력해주세요.";
          return;
        }

        fieldStatus.textContent = "현장 요청을 등록하는 중입니다.";
        try {
          var response = await fetch("/api/field-requests", {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify(payload)
          });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "현장 요청 등록에 실패했습니다.");
          fieldStatus.textContent = "현장 요청을 등록했습니다.";
          loadMyFieldRequests();
        } catch (error) {
          fieldStatus.textContent = error.message;
        }
      }

      async function loadFieldRequests() {
        fieldStatus.textContent = "공개 요청을 불러오는 중입니다.";
        try {
          var response = await fetch("/api/field-requests");
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "공개 요청을 불러오지 못했습니다.");
          renderFieldRequests(data.requests || []);
          fieldStatus.textContent = "공개 요청을 불러왔습니다.";
        } catch (error) {
          fieldStatus.textContent = error.message;
        }
      }

      function renderFieldRequests(requests) {
        if (!requests.length) {
          fieldRequestList.innerHTML = '<li class="note-card"><span>공개된 현장 요청이 없습니다.</span></li>';
          return;
        }

        fieldRequestList.innerHTML = requests.map(function (request) {
          var meta = ["등록 " + formatDateTime(request.created_at), formatRelativeTime(request.created_at), "신청 " + Number(request.application_count || 0) + "명"].filter(Boolean).join(" · ");
          return '<li class="note-card">' +
            '<strong>' + esc(request.public_area || "위치 미정") + '</strong>' +
            '<span>' + esc(meta) + '</span>' +
            '<span>' + esc([request.cleaning_type, request.space_type, request.reward_text].filter(Boolean).join(" · ")) + '</span>' +
            '<button class="chip" type="button" data-apply-request="' + escAttr(request.id) + '">방문 신청</button>' +
            '<button class="chip" type="button" data-detail-request="' + escAttr(request.id) + '">상세 보기</button>' +
            '</li>';
        }).join("");

        fieldRequestList.querySelectorAll("[data-apply-request]").forEach(function (button) {
          button.addEventListener("click", function () {
            applyFieldRequest(button.getAttribute("data-apply-request"));
          });
        });
        fieldRequestList.querySelectorAll("[data-detail-request]").forEach(function (button) {
          button.addEventListener("click", function () {
            loadFieldRequestDetail(button.getAttribute("data-detail-request"));
          });
        });
      }

      async function applyFieldRequest(id) {
        if (!state.authSession) {
          fieldStatus.textContent = "방문 신청은 로그인이 필요합니다.";
          return;
        }

        var message = window.prompt("신청 메시지를 입력해주세요.", "제가 방문해서 견적을 확인할 수 있습니다.");
        if (message === null) return;

        fieldStatus.textContent = "방문 신청을 보내는 중입니다.";
        try {
          var response = await fetch("/api/field-requests", {
            method: "POST",
            headers: authHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({ action: "apply", request_id: id, message: message })
          });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "방문 신청에 실패했습니다.");
          fieldStatus.textContent = "방문 신청을 보냈습니다.";
          loadFieldRequests();
        } catch (error) {
          fieldStatus.textContent = error.message;
        }
      }

      async function loadMyFieldRequests() {
        if (!state.authSession) {
          fieldStatus.textContent = "내 요청 보기는 로그인이 필요합니다.";
          return;
        }

        fieldStatus.textContent = "내 요청을 불러오는 중입니다.";
        try {
          var response = await fetch("/api/field-requests?mine=1", { headers: authHeaders() });
          var data = await response.json().catch(function () { return null; });
          if (!response.ok || !data || data.ok === false) throw new Error((data && data.message) || "내 요청을 불러오지 못했습니다.");
          renderMyFieldRequests(data.requests || []);
          fieldStatus.textContent = "내 요청을 불러왔습니다.";
        } catch (error) {
          fieldStatus.textContent = error.message;

      function buildHoIndex(exposItems, pubItems, floor) {
        var hoIndex = {};
        function addHo(hoNm, source) {
          var raw = String(hoNm || "").trim();
          if (!raw) return;
          var expanded = expandHoRange(raw);
          var norms = expanded.length ? expanded.map(String) : [normalizeHo(raw)].filter(Boolean);
          norms.forEach(function (norm) {
            if (!hoIndex[norm]) {
              hoIndex[norm] = { norm: norm, samples: [], hasExclusive: false, exclusive_m2: 0, shared_m2: 0, total_m2: 0, sources: [], mergedFrom: expanded.length >= 2 ? raw : null };
            }
            if (hoIndex[norm].sources.indexOf(source) === -1) hoIndex[norm].sources.push(source);
            if (hoIndex[norm].samples.indexOf(raw) === -1) hoIndex[norm].samples.push(raw);
            if (!hoIndex[norm].mergedFrom && expanded.length >= 2) hoIndex[norm].mergedFrom = raw;
          });
        }

        exposItems.filter(function (item) { return sameFloorItem(item, floor); }).forEach(function (item) {
          addHo(item.hoNm, "exposInfo");
        });

        pubItems.filter(function (item) { return sameFloorItem(item, floor); }).forEach(function (item) {
          addHo(item.hoNm, "pubuseArea");
          var raw = String(item.hoNm || "").trim();
          var expanded = expandHoRange(raw);
          var norms = expanded.length ? expanded.map(String) : [normalizeHo(raw)].filter(Boolean);
          var area = toNumber(item.area);
          norms.forEach(function (norm) {
            if (!hoIndex[norm]) return;
            if (isExclusiveItem(item)) {
              hoIndex[norm].hasExclusive = true;
              hoIndex[norm].exclusive_m2 += area;
            }
            if (isSharedItem(item)) hoIndex[norm].shared_m2 += area;
          });
        });

        Object.keys(hoIndex).forEach(function (key) {
          var item = hoIndex[key];
          item.exclusive_m2 = round2(item.exclusive_m2);
          item.shared_m2 = round2(item.shared_m2);
          item.total_m2 = round2(item.exclusive_m2 + item.shared_m2);
          item.exclusive_pyeong = item.exclusive_m2 ? round2(item.exclusive_m2 / PYEONG_M2) : null;
          item.shared_pyeong = item.shared_m2 ? round2(item.shared_m2 / PYEONG_M2) : null;
          item.total_pyeong = item.total_m2 ? round2(item.total_m2 / PYEONG_M2) : null;
        });
        return hoIndex;
      }

      function buildHoBreakdownLocal(base, floor, ho, wantHoNorm, hoRows) {
        var breakdown = hoRows.map(function (row) {
          var areaM2 = toNumber(row.area);
          return {
            gb: row.exposPubuseGbCdNm || codeToGb(row.exposPubuseGbCd),
            flrNm: row.flrNoNm || "",
            use: row.mainPurpsCdNm || row.etcPurps || "",
            area_m2: areaM2,
            area_pyeong: round2(areaM2 / PYEONG_M2),
            raw: { flrNo: row.flrNo || "", hoNm: row.hoNm || "" }
          };
        });
        var exclusiveM2 = round2(hoRows.filter(isExclusiveItem).reduce(function (sum, row) { return sum + toNumber(row.area); }, 0));
        var sharedM2 = round2(hoRows.filter(isSharedItem).reduce(function (sum, row) { return sum + toNumber(row.area); }, 0));
        return {
          ok: true,
          build: base.build,
          mode: "ho_breakdown",
          input: { address: addressInput.value.trim(), floor: floor, ho: ho },
          road: base.road || "",
          jibun: base.jibun || "",
          keys: base.keys || {},
          ho_matched: { want: ho, wantHoNorm: wantHoNorm },
          breakdown: breakdown,
          sum: areaSummary(exclusiveM2, sharedM2),
          note: "주소 조회 시 미리 가져온 데이터 기준으로 호별 전유/공용을 구성했습니다."
        };
      }

      function findFloorExclusiveFromItems(pubItems, floor) {
        var candidates = pubItems.filter(function (item) {
          if (!sameFloorItem(item, floor)) return false;
          if (!isExclusiveItem(item)) return false;
          var hoRaw = String(item.hoNm || "").trim();
          return !hoRaw || !normalizeHo(hoRaw);
        }).sort(function (a, b) {
          return toNumber(b.area) - toNumber(a.area);
        });
        if (!candidates.length || !toNumber(candidates[0].area)) return null;
        return { m2: toNumber(candidates[0].area), note: "flrNo=" + (candidates[0].flrNo || "") + ', hoNm="' + (candidates[0].hoNm || "") + '"' };
      }

      function areaSummary(exclusiveM2, sharedM2) {
        var exclusive = exclusiveM2 == null ? null : round2(exclusiveM2);
        var shared = sharedM2 == null ? null : round2(sharedM2);
        var total = round2((exclusive || 0) + (shared || 0));
        return {
          exclusive_m2: exclusive,
          exclusive_pyeong: exclusive ? round2(exclusive / PYEONG_M2) : null,
          shared_m2: shared,
          shared_pyeong: shared ? round2(shared / PYEONG_M2) : null,
          total_m2: total || null,
          total_pyeong: total ? round2(total / PYEONG_M2) : null
        };
      }

      function normalizeHo(value) {
        var match = String(value || "").match(/\d+/);
        return match ? match[0] : "";
      }

      function normalizeFloor(value) {
        var match = String(value || "").match(/-?\d+/);
        return match ? String(Number(match[0])) : "";
      }

      function parseFloorInput(value) {
        var raw = String(value || "").trim();
        var no = normalizeFloor(raw);
        var gb = null;
        if (raw.indexOf("지하") !== -1 || /^B/i.test(raw)) gb = "지하";
        if (raw.indexOf("지상") !== -1 || /^F/i.test(raw)) gb = "지상";
        return { gb: gb, no: no, key: gb && no ? gb + ":" + no : no };
      }

      function floorGbFromItem(item) {
        var code = String(item.flrGbCd || "").trim();
        var text = String((item.flrGbCdNm || "") + " " + (item.flrNoNm || ""));
        if (code === "10" || text.indexOf("지하") !== -1 || Number(item.flrNo) < 0) return "지하";
        if (code === "20" || text.indexOf("지상") !== -1) return "지상";
        return normalizeFloor(item.flrNo || "") ? "지상" : "";
      }

      function sameFloorItem(item, floor) {
        var spec = typeof floor === "object" ? floor : parseFloorInput(floor);
        if (String(normalizeFloor(item.flrNo || "")) !== String(spec.no || "")) return false;
        if (!spec.gb) return true;
        return floorGbFromItem(item) === spec.gb;
      }

      function expandHoRange(hoNm) {
        var raw = String(hoNm || "").replace(/\s/g, "").replace(/호/g, "").replace(/[–—−]/g, "-");
        if (!raw) return [];
        var range = raw.match(/(\d+)\s*[~-]\s*(\d+)/);
        if (range) {
          var start = Number(range[1]);
          var end = Number(range[2]);
          var out = [];
          if (start > 0 && end >= start && end - start <= 30) {
            for (var i = start; i <= end; i += 1) out.push(i);
            return out;
          }
        }
        if (raw.indexOf(",") !== -1) {
          return raw.split(",").map(function (part) {
            return Number(part.replace(/[^\d]/g, ""));
          }).filter(function (n) { return n > 0; });
        }
        var single = Number(raw.replace(/[^\d]/g, ""));
        return single ? [single] : [];
      }

      function hoInMergedHoNm(itemHoNm, wantHoNorm) {
        var want = Number(String(wantHoNorm || "").replace(/[^\d]/g, ""));
        return !!want && expandHoRange(itemHoNm).indexOf(want) !== -1;
      }

      function findRowsByFloorAndHo(items, floor, wantHoNorm) {
        var exact = items.filter(function (item) {
          return sameFloorItem(item, floor) && normalizeHo(item.hoNm || "") === wantHoNorm;
        });
        if (exact.length) return exact;
        return items.filter(function (item) {
          var raw = String(item.hoNm || "").trim();
          return sameFloorItem(item, floor) && raw && hoInMergedHoNm(raw, wantHoNorm);
        });
      }

      function toClientFloorItem(item) {
        var areaM2 = toNumber(item.area);
        return {
          gb: item.flrGbCdNm || "-",
          use: item.mainPurpsCdNm || "-",
          detail: item.etcPurps || "-",
          area_m2: areaM2,
          area_pyeong: round2(areaM2 / PYEONG_M2)
        };
      }

      function isExclusiveItem(item) {
        return String(item.exposPubuseGbCd || "") === "1" || String(item.exposPubuseGbCdNm || "").indexOf("전유") !== -1;
      }

      function isSharedItem(item) {
        return String(item.exposPubuseGbCd || "") === "2" || String(item.exposPubuseGbCdNm || "").indexOf("공용") !== -1;
      }

      function codeToGb(code) {
        if (String(code || "") === "1") return "전유";
        if (String(code || "") === "2") return "공용";
        return String(code || "");
      }

      function toNumber(value) {
        var n = Number(String(value || "").trim());
        return Number.isFinite(n) ? n : 0;
      }

      function round2(value) {
        return Number(Number(value || 0).toFixed(2));
      }

      function fmt(value) {
        if (value === null || value === undefined || value === "") return "-";
        var number = Number(value);
        if (!Number.isFinite(number)) return String(value);
        return number.toLocaleString("ko-KR", { minimumFractionDigits: number % 1 === 0 ? 0 : 2, maximumFractionDigits: 2 });
      }

      function box(label, value) {
        return '<div class="box"><div class="box-label">' + esc(label) + '</div><div class="box-value">' + esc(fmt(value)) + '</div></div>';
      }

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function formatDateTime(value) {
        if (!value) return "";
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        return date.toLocaleString("ko-KR", {
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      function formatRelativeTime(value) {
        if (!value) return "";
        var date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        var diffMs = Date.now() - date.getTime();
        var minutes = Math.max(0, Math.floor(diffMs / 60000));
        if (minutes < 1) return "방금 전";
        if (minutes < 60) return minutes + "분 전";
        var hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + "시간 전";
        var days = Math.floor(hours / 24);
        if (days < 30) return days + "일 전";
        var months = Math.floor(days / 30);
        if (months < 12) return months + "개월 전";
        return Math.floor(months / 12) + "년 전";
      }

      function normalizeReportStatus(value) {
        var text = String(value || "").trim();
        if (text === "방문 완료") return "visited";
        if (text === "미성사") return "not_closed";
        return "quoted";
      }

      function reportStatusLabel(value) {
        if (value === "visited") return "방문 완료";
        if (value === "quoted") return "견적 제출";
        if (value === "not_closed") return "미성사";
        return value || "-";
      }

      function applicantStatsText(stats) {
        if (!stats || !Number(stats.applied_count || 0)) return "활동 이력 없음";
        return [
          "누적 신청 " + Number(stats.applied_count || 0) + "건",
          "승인 " + Number(stats.approved_count || 0) + "건",
          "보고 " + Number(stats.completed_count || 0) + "건",
          "견적 제출 " + Number(stats.quoted_count || 0) + "건"
        ].join(" · ");
      }

      function renderAvatar(avatarUrl, label) {
        var initial = String(label || "?").trim().slice(0, 1).toUpperCase() || "?";
        return '<span class="profile-avatar">' + (
          avatarUrl
            ? '<img src="' + escAttr(avatarUrl) + '" alt="">'
            : esc(initial)
        ) + '</span>';
      }

      function formatFieldLocation(request) {
        var floor = formatFloorLabel(request.floor);
        var ho = String(request.ho || "").trim();
        var parts = [];
        if (floor) parts.push(floor);
        parts.push(ho ? ho + "호" : "호수 미입력");
        return parts.join(" / ");
      }

      function formatFloorLabel(value) {
        var raw = String(value || "").trim();
        if (!raw) return "층 미입력";
        var parsed = parseFloorInput(raw);
        if (parsed.gb && parsed.no) return parsed.gb + " " + parsed.no + "층";
        if (parsed.no) return parsed.no + "층";
        return raw;
      }

      function escAttr(value) {
        return esc(value).replace(/`/g, "&#096;");
      }
    })();
  </script>
</body>
</html>
